<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام غيابات مركز أحمد زبانة - المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- المكتبات الخارجية -->
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #2980b9; --success: #27ae60; --danger: #c0392b; --edit: #f39c12; --word: #2b579a; --dark: #2c3e50; --excel: #1d6f42; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .official-header { text-align: center; border-bottom: 3px solid var(--primary); background: #fff; }
        .official-header h3 { margin: 5px 0; color: var(--dark); }
        .official-header h2 { margin: 10px 0; color: var(--primary); }

        input, select, button { font-family: 'Cairo'; width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        .btn-main { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--success); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        /* عناصر القائمة مع أزرار التحكم */
        .item-list-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; background: #fff; border-radius: 5px; margin-bottom: 5px; }
        .action-btns { display: flex; gap: 5px; }
        .btn-small-edit { background: var(--edit); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .btn-small-del { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }

        .check-group { display: flex; gap: 15px; justify-content: center; background: #f8f9fa; padding: 15px; border-radius: 10px; margin: 10px 0; border: 1px solid #ddd; }
        .check-group label { font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        .table-container { margin-top: 15px; max-height: 400px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background: #f8f9fa; position: sticky; top: 0; }
        
        .flex-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .flex-1 { flex: 1; min-width: 300px; }
        
        #chartArea { width: 100%; max-width: 350px; margin: 20px auto; min-height: 350px; }

        @media (max-width: 768px) {
            .flex-group { flex-direction: column; }
            #chartArea { max-width: 250px; min-height: 250px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPanel" class="card" style="max-width: 400px; margin: 50px auto;">
        <h2 style="text-align:center">دخول النظام</h2>
        <input type="password" id="sysPass" placeholder="كلمة المرور">
        <button class="btn-main" onclick="doLogin()">دخول</button>
    </div>

    <div id="appPanel" style="display:none;">
        <div class="official-header card">
            <h3>الجمهورية الجزائرية الديمقراطية الشعبية</h3>
            <h2>مركز التكوين و التمهين الشهيد أحمد زبانة السوقر1</h2>
            <p>نظام إدارة الغيابات المطور</p>
        </div>

        <div class="flex-group">
            <!-- التخصصات -->
            <div class="card flex-1">
                <h2>📁 إدارة التخصصات</h2>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="specNameIn" placeholder="اسم التخصص الجديد">
                    <button class="btn-main" style="width:100px" onclick="addSpec()">إضافة</button>
                </div>
                <div id="specUI" style="max-height: 200px; overflow-y: auto; margin-top: 10px;"></div>
            </div>
            
            <!-- المتربصين -->
            <div class="card flex-1">
                <h2>👥 إدارة المتربصين</h2>
                <select id="specFilter" onchange="renderTrainees()"></select>
                <input type="text" id="traineeNameIn" placeholder="اسم المتربص">
                <input type="text" id="traineePhoneIn" placeholder="رقم الهاتف">
                <button class="btn-save" onclick="addTrainee()">حفظ المتربص</button>
                <div id="traineeUI" style="max-height: 200px; overflow-y: auto; margin-top: 10px;"></div>
            </div>
        </div>

        <!-- التسجيل -->
        <div class="card">
            <h2>❌ تسجيل غياب</h2>
            <div class="flex-group" style="align-items: center;">
                <div style="flex: 1.5;">
                    <input type="date" id="targetDate" onchange="refreshAll()">
                    <div class="check-group">
                        <label><input type="checkbox" id="chkMorning"> الصباح ☀️</label>
                        <label><input type="checkbox" id="chkEvening"> المساء 🌙</label>
                        <label><input type="checkbox" id="chkFullDay" onchange="toggleFullDay(this)"> كل اليوم 📅</label>
                    </div>
                    <select id="traineeSelect"></select>
                    <button class="btn-main" style="background:var(--danger); margin-top:10px;" onclick="recordAbsence()">تسجيل غياب</button>
                </div>
                <!-- الرسم البياني المكبر -->
                <div style="flex: 1; text-align: center;">
                    <div id="chartArea"><canvas id="dailyChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- السجل -->
        <div class="card">
            <h2>📝 سجل الغيابات</h2>
            <div class="table-container">
                <table>
                    <thead><tr><th>المتربص</th><th>الفترة</th><th>الحالة</th><th>حذف</th></tr></thead>
                    <tbody id="logsTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>⚠️ قائمة الاستدعاءات</h2>
            <div id="alertUI"></div>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('abs_zabbana_v3')) || { specs: [], trainees: [], logs: [] };
    let chartObj = null;

    function doLogin() {
        if(document.getElementById('sysPass').value === '1234') {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('appPanel').style.display = 'block';
            document.getElementById('targetDate').valueAsDate = new Date();
            renderSpecs(); refreshAll();
        } else { alert("كلمة المرور خاطئة!"); }
    }

    // --- إدارة التخصصات (تعديل وحذف) ---
    function addSpec() {
        let n = document.getElementById('specNameIn').value.trim();
        if(n) { db.specs.push({ id: Date.now(), name: n }); save(); renderSpecs(); document.getElementById('specNameIn').value = ''; }
    }
    function renderSpecs() {
        let ui = document.getElementById('specUI'), filter = document.getElementById('specFilter');
        ui.innerHTML = ''; filter.innerHTML = '';
        db.specs.forEach(s => {
            ui.innerHTML += `<div class="item-list-row">
                <span>${s.name}</span>
                <div class="action-btns">
                    <button class="btn-small-edit" onclick="editSpec(${s.id})">✎</button>
                    <button class="btn-small-del" onclick="delSpec(${s.id})">✕</button>
                </div>
            </div>`;
            filter.innerHTML += `<option value="${s.id}">${s.name}</option>`;
        });
        renderTrainees();
    }
    function editSpec(id) {
        let s = db.specs.find(x => x.id == id);
        let n = prompt("تعديل اسم التخصص:", s.name);
        if(n) { s.name = n; save(); renderSpecs(); }
    }
    function delSpec(id) {
        if(confirm("سيتم حذف التخصص وجميع المتربصين التابعين له! هل أنت متأكد؟")) {
            db.specs = db.specs.filter(x => x.id != id);
            db.trainees = db.trainees.filter(x => x.specId != id);
            save(); renderSpecs();
        }
    }

    // --- إدارة المتربصين (تعديل وحذف) ---
    function addTrainee() {
        let n = document.getElementById('traineeNameIn').value.trim(), p = document.getElementById('traineePhoneIn').value.trim(), s = document.getElementById('specFilter').value;
        if(n && s) { db.trainees.push({ id: Date.now(), name: n, phone: p, specId: s }); save(); renderTrainees(); }
    }
    function renderTrainees() {
        let sId = document.getElementById('specFilter').value, ui = document.getElementById('traineeUI'), sel = document.getElementById('traineeSelect');
        ui.innerHTML = ''; sel.innerHTML = '';
        db.trainees.filter(t => t.specId == sId).forEach(t => {
            ui.innerHTML += `<div class="item-list-row">
                <span>${t.name}</span>
                <div class="action-btns">
                    <button class="btn-small-edit" onclick="editTrainee(${t.id})">✎</button>
                    <button class="btn-small-del" onclick="delTrainee(${t.id})">✕</button>
                </div>
            </div>`;
            sel.innerHTML += `<option value="${t.id}">${t.name}</option>`;
        });
    }
    function editTrainee(id) {
        let t = db.trainees.find(x => x.id == id);
        let n = prompt("تعديل اسم المتربص:", t.name);
        let p = prompt("تعديل رقم الهاتف:", t.phone);
        if(n) { t.name = n; t.phone = p; save(); renderTrainees(); }
    }
    function delTrainee(id) {
        if(confirm("حذف المتربص وسجل غياباته؟")) {
            db.trainees = db.trainees.filter(x => x.id != id);
            db.logs = db.logs.filter(x => x.tId != id);
            save(); renderTrainees(); refreshAll();
        }
    }

    // --- منطق الغيابات ---
    function toggleFullDay(el) {
        document.getElementById('chkMorning').checked = el.checked;
        document.getElementById('chkEvening').checked = el.checked;
    }

    function recordAbsence() {
        let tId = document.getElementById('traineeSelect').value, d = document.getElementById('targetDate').value;
        let isM = document.getElementById('chkMorning').checked, isE = document.getElementById('chkEvening').checked;
        if(!tId || !d || (!isM && !isE)) return alert("أكمل البيانات!");
        
        if(isM) { db.logs = db.logs.filter(x => !(x.tId==tId && x.date==d && x.period=='صباحية')); db.logs.push({tId:tId, date:d, period:'صباحية', status:'غائب'}); }
        if(isE) { db.logs = db.logs.filter(x => !(x.tId==tId && x.date==d && x.period=='مسائية')); db.logs.push({tId:tId, date:d, period:'مسائية', status:'غائب'}); }
        save(); refreshAll();
    }

    function renderTable() {
        let d = document.getElementById('targetDate').value, tbody = document.getElementById('logsTableBody');
        tbody.innerHTML = '';
        db.logs.filter(x => x.date === d).forEach(log => {
            let t = db.trainees.find(x => x.id == log.tId);
            if(t) {
                tbody.innerHTML += `<tr><td>${t.name}</td><td>${log.period}</td><td style="color:red">غائب</td>
                <td><button class="btn-small-del" onclick="deleteLog(${log.tId},'${log.date}','${log.period}')">✕</button></td></tr>`;
            }
        });
    }

    function deleteLog(tId, date, period) {
        db.logs = db.logs.filter(x => !(x.tId == tId && x.date == date && x.period == period));
        save(); refreshAll();
    }

    // --- الإحصائيات (تعديل الألوان والحجم) ---
    function updateChart() {
        let d = document.getElementById('targetDate').value;
        let logs = db.logs.filter(x => x.date === d);
        let m = logs.filter(x => x.period === 'صباحية').length;
        let e = logs.filter(x => x.period === 'مسائية').length;
        
        let ctx = document.getElementById('dailyChart').getContext('2d');
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['غياب الصباح ☀️', 'غياب المساء 🌙'],
                datasets: [{
                    data: [m, e],
                    backgroundColor: ['#FFFFFF', '#000000'], // أبيض للصباح، أسود للمساء
                    borderColor: '#2980b9', // إطار أزرق للتمييز
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { font: { size: 14, family: 'Cairo' } } }
                }
            }
        });
    }

    function renderAlerts() {
        let ui = document.getElementById('alertUI'); ui.innerHTML = '';
        let counts = {};
        db.logs.forEach(x => counts[x.tId] = (counts[x.tId] || 0) + 1);
        for(let id in counts) {
            if(counts[id] >= 3) {
                let t = db.trainees.find(x => x.id == id);
                if(t) ui.innerHTML += `<div class="item-list-row" style="background:#fff5f5"><span><b>${t.name}</b> (${counts[id]} غيابات)</span></div>`;
            }
        }
    }

    function refreshAll() { renderTable(); updateChart(); renderAlerts(); }
    function save() { localStorage.setItem('abs_zabbana_v3', JSON.stringify(db)); }
</script>
</body>
</html>
