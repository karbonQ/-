<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق حضور وغياب</title>
<style>
body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:0; background:#f5f6fa; color:#333; }
h1,h2,h3{margin:0 0 10px 0; text-align:center;}
button,input,select{font-size:16px;}
.centered { display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; padding:20px; }
#loginPage { max-width:400px; width:100%; background:#fff; padding:30px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.15); }
#loginPage input{width:100%; margin:10px 0; padding:12px; border:1px solid #ccc; border-radius:8px; }
.container { max-width:1000px; margin:20px auto; background:#fff; padding:25px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.1); }
section{margin-bottom:25px; display:flex; flex-direction:column; gap:10px;}
label{font-weight:bold; margin-bottom:5px;}
input,select{padding:10px; border-radius:8px; border:1px solid #ccc; width:100%; box-sizing:border-box;}
.button-group, .actions{display:flex; flex-wrap:wrap; gap:10px;}
button{padding:10px 18px; border:none; border-radius:8px; cursor:pointer; transition:0.3s; color:#fff;}
button:hover{opacity:0.85;}
.presentBtn{background:#27ae60;}
.absentBtn{background:#c0392b;}
.button-group button{background:#2980b9;}
.button-group button:hover{opacity:0.85;}
#exportCSVBtn{background:#8e44ad;}
ul{list-style:none; padding:0; max-height:250px; overflow-y:auto;}
.chart-container{width:100%; max-width:500px; margin:20px auto;}
#searchTrainee, #filterSpecialty{width:100%;}
@media(max-width:768px){
    .button-group, .actions{flex-direction:column;}
    input, select, button{font-size:15px;}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<div id="loginPage" class="centered">
    <h2>تسجيل الدخول</h2>
    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button id="loginBtn">دخول</button>
</div>

<div id="app" style="display:none;" class="container">
    <h1>تسجيل الحضور/الغياب</h1>
    <section>
        <label>اختر التخصص:</label>
        <select id="specialtySelect"></select>
        <input type="text" id="newSpecialty" placeholder="إضافة تخصص جديد">
        <div class="button-group">
            <button id="addSpecialtyBtn">إضافة</button>
            <button id="editSpecialtyBtn">✏ تعديل</button>
            <button id="deleteSpecialtyBtn">🗑 حذف</button>
        </div>
    </section>

    <section>
        <label>اختر المتربص:</label>
        <select id="traineeSelect"></select>
        <input type="text" id="nameInput" placeholder="اسم المتربص">
        <div class="button-group">
            <button id="addTraineeBtn">إضافة</button>
            <button id="editTraineeBtn">✏ تعديل</button>
            <button id="deleteTraineeBtn">🗑 حذف</button>
        </div>
    </section>

    <section>
        <label>تاريخ تسجيل الحضور/الغياب:</label>
        <input type="date" id="attendanceDate">
        <div class="actions">
            <button class="presentBtn" id="presentBtn">✔ حضور</button>
            <button class="absentBtn" id="absentBtn">✖ غياب</button>
        </div>
    </section>

    <section>
        <h3>بحث وتصفية السجلات</h3>
        <input type="text" id="searchTrainee" placeholder="بحث عن متربص">
        <select id="filterSpecialty"><option value="">كل التخصصات</option></select>
    </section>

    <section class="chart-container">
        <h3>📊 إحصائيات الحضور اليوم</h3>
        <canvas id="attendanceChart"></canvas>
    </section>

    <section>
        <h3>سجل الحضور/الغياب</h3>
        <ul id="attendanceList"></ul>
        <button id="exportCSVBtn">تصدير Excel</button>
    </section>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){
    const loginBtn = document.getElementById("loginBtn");
    const loginPage = document.getElementById("loginPage");
    const app = document.getElementById("app");

    const addSpecialtyBtn = document.getElementById("addSpecialtyBtn");
    const editSpecialtyBtn = document.getElementById("editSpecialtyBtn");
    const deleteSpecialtyBtn = document.getElementById("deleteSpecialtyBtn");
    const addTraineeBtn = document.getElementById("addTraineeBtn");
    const editTraineeBtn = document.getElementById("editTraineeBtn");
    const deleteTraineeBtn = document.getElementById("deleteTraineeBtn");
    const specialtySelect = document.getElementById("specialtySelect");
    const traineeSelect = document.getElementById("traineeSelect");
    const newSpecialty = document.getElementById("newSpecialty");
    const nameInput = document.getElementById("nameInput");
    const attendanceDate = document.getElementById("attendanceDate");
    const presentBtn = document.getElementById("presentBtn");
    const absentBtn = document.getElementById("absentBtn");
    const attendanceList = document.getElementById("attendanceList");
    const exportCSVBtn = document.getElementById("exportCSVBtn");
    const searchTrainee = document.getElementById("searchTrainee");
    const filterSpecialty = document.getElementById("filterSpecialty");

    let specialties = JSON.parse(localStorage.getItem("specialties")) || [];
    let trainees = JSON.parse(localStorage.getItem("trainees")) || {};
    let attendanceRecords = JSON.parse(localStorage.getItem("attendanceRecords")) || {};
    let chart;

    loginBtn.addEventListener("click", ()=>{
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        if(username==="admin" && password==="1234"){
            loginPage.style.display="none";
            app.style.display="block";
            loadSpecialties();
            if(specialties.length>0) loadTrainees(specialtySelect.value);
            renderChart();
        } else { alert("اسم المستخدم أو كلمة المرور خاطئة"); }
    });

    // إضافة/تعديل/حذف تخصصات ومتربصين
    addSpecialtyBtn.addEventListener("click", ()=>{
        const spec = newSpecialty.value.trim();
        if(!spec) return alert("أدخل اسم التخصص");
        if(specialties.includes(spec)) return alert("التخصص موجود بالفعل");
        specialties.push(spec);
        newSpecialty.value="";
        loadSpecialties();
    });
    editSpecialtyBtn.addEventListener("click", ()=>{
        const oldSpec = specialtySelect.value;
        if(!oldSpec) return alert("اختر التخصص للتعديل");
        const newName = prompt("أدخل الاسم الجديد للتخصص:", oldSpec);
        if(!newName) return;
        if(specialties.includes(newName)) return alert("التخصص موجود بالفعل");
        specialties[specialties.indexOf(oldSpec)] = newName;
        if(trainees[oldSpec]){
            trainees[newName] = trainees[oldSpec];
            delete trainees[oldSpec];
        }
        loadSpecialties();
    });
    deleteSpecialtyBtn.addEventListener("click", ()=>{
        const spec = specialtySelect.value;
        if(!spec) return alert("اختر التخصص للحذف");
        if(!confirm(`هل تريد حذف التخصص "${spec}" وكل المتربصين فيه؟`)) return;
        specialties = specialties.filter(s=>s!==spec);
        delete trainees[spec];
        loadSpecialties();
    });

    addTraineeBtn.addEventListener("click", ()=>{
        const spec = specialtySelect.value;
        if(!spec) return alert("اختر التخصص أولاً");
        const name = nameInput.value.trim();
        if(!name) return alert("أدخل اسم المتربص");
        if(!trainees[spec]) trainees[spec]=[];
        if(trainees[spec].includes(name)) return alert("المتربص موجود بالفعل");
        trainees[spec].push(name);
        nameInput.value="";
        loadTrainees(spec);
    });

    editTraineeBtn.addEventListener("click", ()=>{
        const spec = specialtySelect.value;
        if(!spec) return alert("اختر التخصص أولاً");
        const oldName = traineeSelect.value;
        if(!oldName) return alert("اختر المتربص للتعديل");
        const newName = nameInput.value.trim();
        if(!newName) return alert("أدخل الاسم الجديد");
        if(trainees[spec].includes(newName)) return alert("المتربص موجود بالفعل");
        trainees[spec][trainees[spec].indexOf(oldName)] = newName;
        loadTrainees(spec);
    });

    deleteTraineeBtn.addEventListener("click", ()=>{
        const spec = specialtySelect.value;
        if(!spec) return alert("اختر التخصص أولاً");
        const name = traineeSelect.value;
        if(!name) return alert("اختر المتربص للحذف");
        if(!confirm(`هل تريد حذف المتربص "${name}"؟`)) return;
        trainees[spec] = trainees[spec].filter(n=>n!==name);
        loadTrainees(spec);
    });

    specialtySelect.addEventListener("change", ()=> loadTrainees(specialtySelect.value));

    function loadSpecialties(){
        specialtySelect.innerHTML="";
        specialties.forEach(s=>{
            const opt=document.createElement("option");
            opt.value=s; opt.textContent=s;
            specialtySelect.appendChild(opt);
        });
        filterSpecialty.innerHTML='<option value="">كل التخصصات</option>';
        specialties.forEach(s=>{
            const opt=document.createElement("option");
            opt.value=s; opt.textContent=s;
            filterSpecialty.appendChild(opt);
        });
        localStorage.setItem("specialties", JSON.stringify(specialties));
        if(specialties.length>0) loadTrainees(specialtySelect.value);
    }

    function loadTrainees(spec){
        traineeSelect.innerHTML="";
        if(!trainees[spec]) trainees[spec]=[];
        trainees[spec].forEach(n=>{
            const opt=document.createElement("option");
            opt.value=n; opt.textContent=n;
            traineeSelect.appendChild(opt);
        });
        localStorage.setItem("trainees", JSON.stringify(trainees));
    }

    presentBtn.addEventListener("click", ()=> markAttendance("حاضر"));
    absentBtn.addEventListener("click", ()=> markAttendance("غائب"));

    function markAttendance(status){
        const date = attendanceDate.value;
        const trainee = traineeSelect.value;
        if(!date || !trainee) return alert("اختر التاريخ والمتربص أولاً");
        if(!attendanceRecords[date]) attendanceRecords[date]={};
        attendanceRecords[date][trainee]=status;
        renderAttendanceList();
        renderChart();
        localStorage.setItem("attendanceRecords", JSON.stringify(attendanceRecords));
    }

    function renderAttendanceList(){
        const date = attendanceDate.value;
        const search = searchTrainee.value.trim().toLowerCase();
        const filter = filterSpecialty.value;
        attendanceList.innerHTML="";
        if(attendanceRecords[date]){
            Object.entries(attendanceRecords[date]).forEach(([name,status])=>{
                if((!filter || (trainees[filter] && trainees[filter].includes(name))) &&
                   (!search || name.toLowerCase().includes(search))){
                       const li = document.createElement("li");
                       li.textContent = `${name}: ${status}`;
                       if(status === "غائب"){
                           li.style.backgroundColor = "#ff0000"; 
                           li.style.color = "#ffffff";
                       } else {
                           li.style.backgroundColor = "#d4edda";
                           li.style.color = "#155724";
                       }
                       li.style.padding = "10px";
                       li.style.margin = "5px 0";
                       li.style.borderRadius = "8px";
                       attendanceList.appendChild(li);
                }
            });
        }
    }

    searchTrainee.addEventListener("input", renderAttendanceList);
    filterSpecialty.addEventListener("change", ()=>{ renderAttendanceList(); renderChart(); });
    attendanceDate.addEventListener("change", renderChart);

    function renderChart(){
        const date = attendanceDate.value;
        const filter = filterSpecialty.value;
        let present = 0, absent = 0;
        if(attendanceRecords[date]){
            Object.entries(attendanceRecords[date]).forEach(([trainee, status])=>{
                if(!filter || (trainees[filter] && trainees[filter].includes(trainee))){
                    if(status==="حاضر") present++; else absent++;
                }
            });
        }
        const ctx = document.getElementById("attendanceChart").getContext("2d");
        if(chart) chart.destroy();
        chart = new Chart(ctx,{
            type:"doughnut",
            data:{
                labels:["حاضر","غائب"],
                datasets:[{data:[present,absent], backgroundColor:["#27ae60","#c0392b"]}]
            }
        });
    }

    exportCSVBtn.addEventListener("click", ()=>{
        let allRecords=[];
        Object.entries(attendanceRecords).forEach(([date, records])=>{
            Object.entries(records).forEach(([trainee,status])=>{
                allRecords.push({التاريخ: date, المتربص: trainee, الحالة: status});
            });
        });
        allRecords.sort((a,b)=>{
            if(a.التاريخ < b.التاريخ) return -1;
            if(a.التاريخ > b.التاريخ) return 1;
            return a.المتربص.localeCompare(b.المتربص);
        });
        const ws = XLSX.utils.json_to_sheet(allRecords);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "الحضور");
        XLSX.writeFile(wb, "attendance.xlsx");
    });

});
</script>
</body>
</html>
