<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق حضور وغياب عصري</title>
<style>
/* عام */
body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; padding:0; background:#f5f6fa; color:#333; }
h1,h2,h3{margin:0 0 10px 0; text-align:center;}
button,input,select{font-size:16px;}

/* مركز تسجيل الدخول */
.centered { display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; padding:20px; }
#loginPage { max-width:400px; width:100%; background:#fff; padding:30px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.15); }
#loginPage input{width:100%; margin:10px 0; padding:12px; border:1px solid #ccc; border-radius:8px; }

/* التطبيق */
.container { max-width:1000px; margin:20px auto; background:#fff; padding:25px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.1); }
section{margin-bottom:25px; display:flex; flex-direction:column; gap:10px;}
label{font-weight:bold; margin-bottom:5px;}
input,select{padding:10px; border-radius:8px; border:1px solid #ccc; width:100%; box-sizing:border-box;}
.button-group, .actions{display:flex; flex-wrap:wrap; gap:10px;}
button{padding:10px 18px; border:none; border-radius:8px; cursor:pointer; transition:0.3s; color:#fff;}
button:hover{opacity:0.85;}
.presentBtn{background:#27ae60;}
.absentBtn{background:#c0392b;}
.button-group button{background:#2980b9;}
.button-group button:hover{opacity:0.85;}
#exportCSVBtn{background:#8e44ad;}

/* السجل */
ul{list-style:none; padding:0; max-height:250px; overflow-y:auto;}
ul li{background:#f1f2f6; padding:10px; margin:5px 0; border-radius:8px;}

/* الرسم البياني */
.chart-container{width:100%; max-width:500px; margin:20px auto;}

/* بحث وتصفية */
#searchTrainee, #filterSpecialty{width:100%;}

/* Responsive */
@media(max-width:768px){
    .button-group, .actions{flex-direction:column;}
    input, select, button{font-size:15px;}
}
</style>
</head>
<body>

<!-- تسجيل الدخول -->
<div id="loginPage" class="centered">
    <h2>تسجيل الدخول</h2>
    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button id="loginBtn">دخول</button>
</div>

<!-- التطبيق -->
<div id="app" style="display:none;" class="container">
    <h1>تسجيل الحضور/الغياب</h1>

    <section>
        <label>اختر التخصص:</label>
        <select id="specialtySelect"></select>
        <input type="text" id="newSpecialty" placeholder="إضافة تخصص جديد">
        <div class="button-group">
            <button id="addSpecialtyBtn">إضافة</button>
            <button id="editSpecialtyBtn">✏ تعديل</button>
            <button id="deleteSpecialtyBtn">🗑 حذف</button>
        </div>
    </section>

    <section>
        <label>اختر المتربص:</label>
        <select id="traineeSelect"></select>
        <input type="text" id="nameInput" placeholder="اسم المتربص">
        <div class="button-group">
            <button id="addTraineeBtn">إضافة</button>
            <button id="editTraineeBtn">✏ تعديل</button>
            <button id="deleteTraineeBtn">🗑 حذف</button>
        </div>
    </section>

    <section>
        <label>تاريخ تسجيل الحضور/الغياب:</label>
        <input type="date" id="attendanceDate">
        <div class="actions">
            <button class="presentBtn" id="presentBtn">✔ حضور</button>
            <button class="absentBtn" id="absentBtn">✖ غياب</button>
        </div>
    </section>

    <section>
        <h3>بحث وتصفية السجلات</h3>
        <input type="text" id="searchTrainee" placeholder="بحث عن متربص">
        <select id="filterSpecialty"><option value="">كل التخصصات</option></select>
    </section>

    <section class="chart-container">
        <h3>📊 إحصائيات الحضور اليوم</h3>
        <canvas id="attendanceChart"></canvas>
    </section>

    <section>
        <h3>سجل الحضور/الغياب</h3>
        <ul id="attendanceList"></ul>
        <button id="exportCSVBtn">تصدير CSV</button>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        const attendanceList = document.getElementById("attendanceList");

});
</script>
</body>
</html>
