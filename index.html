<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> اتسجيل الحضور/الغياب اليومي للمتربصين </title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2980b9;
            --success: #27ae60;
            --danger: #c0392b;
            --bg: #f5f6fa;
            --card: #ffffff;
            --text: #2f3640;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* تصميم البطاقات */
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { border-bottom: 2px solid var(--bg); padding-bottom: 10px; margin-top: 0; color: var(--primary); }

        /* العناصر التفاعلية */
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        
        .btn-add { background: var(--primary); }
        .btn-edit { background: #f39c12; }
        .btn-delete { background: var(--danger); }
        .btn-present { background: var(--success); flex: 1; padding: 15px; font-size: 1.1em; }
        .btn-absent { background: var(--danger); flex: 1; padding: 15px; font-size: 1.1em; }

        /* سجل الحضور */
        .attendance-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; border-radius: 8px; margin-bottom: 5px; }
        .status-present { background: #d4edda; color: #155724; }
        .status-absent { background: #f8d7da; color: #721c24; }

        .chart-box { max-width: 300px; margin: 0 auto; }
        
        #loginPage { text-align: center; max-width: 400px; margin: 100px auto; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div id="loginPage" class="card">
    <h2>تسجيل الدخول للمشرف</h2>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button class="btn-add" style="width:100%" onclick="login()">دخول</button>
</div>

<div id="mainApp" style="display:none;" class="container">
    <div class="card">
        <h2>1. إدارة التخصصات والمتربصين</h2>
        <label>التخصص:</label>
        <div style="display:flex; gap:10px;">
            <select id="specList" onchange="updateTraineeList()"></select>
            <input type="text" id="specInput" placeholder="تخصص جديد..." style="margin:0">
        </div>
        <div class="btn-group">
            <button class="btn-add" onclick="addSpec()">إضافة</button>
            <button class="btn-edit" onclick="editSpec()">تعديل</button>
            <button class="btn-delete" onclick="deleteSpec()">حذف</button>
        </div>

        <hr>

        <label>المتربص:</label>
        <div style="display:flex; gap:10px;">
            <select id="traineeList"></select>
            <input type="text" id="traineeInput" placeholder="اسم المتربص..." style="margin:0">
        </div>
        <div class="btn-group">
            <button class="btn-add" onclick="addTrainee()">إضافة</button>
            <button class="btn-edit" onclick="editTrainee()">تعديل</button>
            <button class="btn-delete" onclick="deleteTrainee()">حذف</button>
        </div>
    </div>

    <div class="card">
        <h2>2. تسجيل حضور اليوم</h2>
        <input type="date" id="attDate">
        <div style="display:flex; gap:15px; margin-top:10px;">
            <button class="btn-present" onclick="mark('حاضر')">✔ تسجيل حضور</button>
            <button class="btn-absent" onclick="mark('غائب')">✖ تسجيل غياب</button>
        </div>
    </div>

    <div class="card">
        <h2>3. الإحصائيات والبحث</h2>
        <div style="display:flex; gap:10px;">
            <input type="text" id="searchBox" placeholder="بحث بالاسم..." oninput="renderAttendance()">
            <select id="filterSpec" onchange="renderAttendance(); updateChart();">
                <option value="">كل التخصصات</option>
            </select>
        </div>
        
        <div class="chart-box">
            <canvas id="myChart"></canvas>
        </div>

        <div id="attendanceLogs" style="margin-top:20px;"></div>
        <button class="btn-add" style="width:100%; background:#8e44ad; margin-top:15px;" onclick="exportExcel()">تصدير سجلات المركز (Excel)</button>
    </div>
</div>

<script>
    // البيانات الأساسية
    let data = JSON.parse(localStorage.getItem('eduData')) || { specs: [], trainees: [], attendance: [] };
    let chartInstance = null;

    function save() { localStorage.setItem('eduData', JSON.stringify(data)); }

    function login() {
        if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === '1234') {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            init();
        } else { alert("خطأ في البيانات"); }
    }

    function init() {
        document.getElementById('attDate').valueAsDate = new Date();
        refreshSpecs();
        renderAttendance();
        updateChart();
    }

    // إدارة التخصصات
    function addSpec() {
        let name = document.getElementById('specInput').value.trim();
        if(!name) return;
        data.specs.push({ id: Date.now(), name: name });
        document.getElementById('specInput').value = '';
        save(); refreshSpecs();
    }

    function refreshSpecs() {
        let html = data.specs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        document.getElementById('specList').innerHTML = html;
        document.getElementById('filterSpec').innerHTML = '<option value="">كل التخصصات</option>' + html;
        updateTraineeList();
    }

    function deleteSpec() {
        let id = document.getElementById('specList').value;
        if(!id || !confirm("سيتم حذف التخصص وجميع متربصيه!")) return;
        data.specs = data.specs.filter(s => s.id != id);
        data.trainees = data.trainees.filter(t => t.specId != id);
        save(); refreshSpecs();
    }

    // إدارة المتربصين
    function addTrainee() {
        let name = document.getElementById('traineeInput').value.trim();
        let specId = document.getElementById('specList').value;
        if(!name || !specId) return alert("اختر تخصصاً واكتب اسماً");
        data.trainees.push({ id: Date.now(), name: name, specId: specId });
        document.getElementById('traineeInput').value = '';
        save(); updateTraineeList();
    }

    function updateTraineeList() {
        let specId = document.getElementById('specList').value;
        let trainees = data.trainees.filter(t => t.specId == specId);
        document.getElementById('traineeList').innerHTML = trainees.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    }

    function deleteTrainee() {
        let id = document.getElementById('traineeList').value;
        if(!id || !confirm("حذف المتربص؟")) return;
        data.trainees = data.trainees.filter(t => t.id != id);
        save(); updateTraineeList();
    }

    // تسجيل الحضور
    function mark(status) {
        let tId = document.getElementById('traineeList').value;
        let date = document.getElementById('attDate').value;
        if(!tId || !date) return alert("بيانات ناقصة");

        // منع التكرار في نفس اليوم
        data.attendance = data.attendance.filter(a => !(a.tId == tId && a.date == date));
        
        data.attendance.push({ tId: tId, date: date, status: status });
        save(); renderAttendance(); updateChart();
    }

    function renderAttendance() {
        let date = document.getElementById('attDate').value;
        let search = document.getElementById('searchBox').value.toLowerCase();
        let filter = document.getElementById('filterSpec').value;
        
        let logs = data.attendance.filter(a => a.date === date);
        let html = '';

        logs.forEach(log => {
            let trainee = data.trainees.find(t => t.id == log.tId);
            if(!trainee) return;
            
            if((!filter || trainee.specId == filter) && (trainee.name.toLowerCase().includes(search))) {
                let statusClass = log.status === 'حاضر' ? 'status-present' : 'status-absent';
                html += `<div class="attendance-row ${statusClass}">
                            <span><b>${trainee.name}</b></span>
                            <span>${log.status}</span>
                         </div>`;
            }
        });
        document.getElementById('attendanceLogs').innerHTML = html || '<p style="text-align:center">لا توجد سجلات لهذا التاريخ</p>';
    }

    // الرسم البياني
    function updateChart() {
        let date = document.getElementById('attDate').value;
        let filter = document.getElementById('filterSpec').value;
        let daily = data.attendance.filter(a => a.date === date);
        
        if(filter) {
            daily = daily.filter(a => {
                let t = data.trainees.find(tr => tr.id == a.tId);
                return t && t.specId == filter;
            });
        }

        let present = daily.filter(a => a.status === 'حاضر').length;
        let absent = daily.filter(a => a.status === 'غائب').length;

        const ctx = document.getElementById('myChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['حضور', 'غياب'],
                datasets: [{ data: [present, absent], backgroundColor: ['#27ae60', '#c0392b'] }]
            },
            options: { responsive: true }
        });
    }

    // تصدير البيانات
    function exportExcel() {
        let report = data.attendance.map(a => {
            let t = data.trainees.find(tr => tr.id == a.tId);
            let s = data.specs.find(sp => sp.id == (t ? t.specId : null));
            return {
                "التاريخ": a.date,
                "المتربص": t ? t.name : "محذوف",
                "التخصص": s ? s.name : "غير محدد",
                "الحالة": a.status
            };
        });

        const ws = XLSX.utils.json_to_sheet(report);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "سجل الحضور العام");
        XLSX.writeFile(wb, "Center_Attendance_Report.xlsx");
    }
</script>
</body>
</html>
