<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>نظام إدارة الغيابات - مركز أحمد زبانة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2980b9; --success: #27ae60; --danger: #c0392b; --edit: #f39c12; --word: #2b579a; --dark: #2c3e50; --excel: #1d6f42; --backup: #8e44ad; --report: #16a085; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select, button { font-family: 'Cairo'; width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--success); color: white; border: none; cursor: pointer; }
        .btn-danger { background: var(--danger); color: white; border: none; cursor: pointer; }
        
        /* أزرار العمليات العصرية */
        .action-btn { border: none; background: none; cursor: pointer; padding: 8px; border-radius: 50%; transition: all 0.3s ease; display: inline-flex; align-items: center; justify-content: center; margin: 0 2px; font-size: 1.1rem; }
        .btn-edit-modern { color: #f39c12; background: #fdf5e6; }
        .btn-edit-modern:hover { background: #f39c12; color: white; transform: scale(1.1); }
        .btn-del-modern { color: #e74c3c; background: #fdf2f2; }
        .btn-del-modern:hover { background: #e74c3c; color: white; transform: scale(1.1); }

        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .flex-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .flex-1 { flex: 1; min-width: 300px; }
        .wa-btn { background: #25D366; color: white; padding: 5px 12px; text-decoration: none; border-radius: 5px; font-size: 0.8rem; }
        .word-btn { background: var(--word); color: white; padding: 5px 12px; border: none; border-radius: 5px; font-size: 0.8rem; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <!-- واجهة الدخول -->
    <div id="loginPanel" class="card" style="max-width: 450px; margin: 50px auto; border-top: 5px solid var(--primary);">
        <div id="loginView">
            <h2 style="text-align:center;">🔑 دخول الأستاذ</h2>
            <input type="text" id="userName" placeholder="اسم المستخدم (admin)">
            <input type="password" id="userPass" placeholder="كلمة السر (1234)">
            <button class="btn-main" onclick="handleLogin()">دخول النظام</button>
            <p style="text-align:center;"><a href="#" onclick="showRegister()">إنشاء حساب جديد</a></p>
        </div>
        <div id="registerView" style="display:none;">
            <h2 style="text-align:center;">📝 حساب جديد</h2>
            <input type="text" id="regName" placeholder="الاسم الكامل">
            <input type="password" id="regPass" placeholder="كلمة السر">
            <button class="btn-save" onclick="handleRegister()">تأكيد التسجيل</button>
            <button onclick="showLogin()" style="border:none; background:none; color:red; cursor:pointer; width:100%;">إلغاء</button>
        </div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="appPanel" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <strong>الأستاذ: <span id="profDisplayName"></span></strong>
            <button onclick="window.location.reload()" style="background:var(--danger); color:white; border:none; padding:5px 15px; border-radius:8px; cursor:pointer;">تسجيل الخروج</button>
        </div>

        <div class="card" style="text-align:center; border-bottom: 3px solid var(--primary);">
            <h3 style="margin:0;">الجمهورية الجزائرية الديمقراطية الشعبية</h3>
            <h3 style="margin:5px 0; color:var(--primary);">مركز التكوين المهني والتمهين الشهيد أحمد زبانة السوقر 01</h3>
        </div>

        <div class="flex-group">
            <div class="card flex-1">
                <h2>التخصصات والمتربصين</h2>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="specNameIn" placeholder="تخصص جديد">
                    <button class="btn-main" style="width:80px" onclick="addSpec()">إضافة</button>
                </div>
                <div id="specUI" style="margin-top:10px; max-height:150px; overflow-y:auto; border:1px solid #eee;"></div>
                <hr>
                <select id="specFilter" onchange="renderTrainees()"></select>
                <input type="text" id="traineeNameIn" placeholder="اسم المتربص">
                <input type="text" id="traineePhoneIn" placeholder="رقم الولي">
                <button class="btn-save" onclick="addTrainee()">حفظ متربص</button>
                <div id="traineeUI" style="margin-top:10px; max-height:150px; overflow-y:auto; border:1px solid #eee;"></div>
            </div>

            <div class="card flex-1">
                <h2>تسجيل الحضور اليومي</h2>
                <input type="date" id="targetDate" onchange="refreshAll()">
                <select id="traineeSelect"></select>
                <div class="flex-group" style="margin-top:10px;">
                    <div style="flex:1; border:1px solid #eee; padding:10px; border-radius:10px; text-align:center;">
                        <strong>صباحاً</strong><br>
                        <button class="btn-save" style="width:45%" onclick="record('AM','حاضر')">✅</button>
                        <button class="btn-danger" style="width:45%" onclick="record('AM','غائب')">❌</button>
                    </div>
                    <div style="flex:1; border:1px solid #eee; padding:10px; border-radius:10px; text-align:center;">
                        <strong>مساءً</strong><br>
                        <button class="btn-save" style="width:45%" onclick="record('PM','حاضر')">✅</button>
                        <button class="btn-danger" style="width:45%" onclick="record('PM','غائب')">❌</button>
                    </div>
                </div>
                <canvas id="dailyChart" height="120" style="margin-top:10px;"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>⚠️ قائمة الاستدعاءات</h2>
            <div id="alertUI"></div>
        </div>
    </div>
</div>

<script>
    // قاعدة البيانات
    let db = JSON.parse(localStorage.getItem('abs_v3_final')) || { users:[{name:'admin', pass:'1234'}], specs: [], trainees: [], logs: [] };
    function save() { localStorage.setItem('abs_v3_final', JSON.stringify(db)); }
    let chartObj = null;

    // --- نظام الدخول ---
    function showRegister() { document.getElementById('loginView').style.display='none'; document.getElementById('registerView').style.display='block'; }
    function showLogin() { document.getElementById('registerView').style.display='none'; document.getElementById('loginView').style.display='block'; }

    function handleRegister() {
        let n = document.getElementById('regName').value, p = document.getElementById('regPass').value;
        if(n && p) { db.users.push({name:n, pass:p}); save(); alert("تم التسجيل!"); showLogin(); }
    }

    function handleLogin() {
        let n = document.getElementById('userName').value, p = document.getElementById('userPass').value;
        let user = db.users.find(u => u.name === n && u.pass === p);
        if(user) {
            document.getElementById('loginPanel').style.display='none';
            document.getElementById('appPanel').style.display='block';
            document.getElementById('profDisplayName').innerText = user.name;
            document.getElementById('targetDate').valueAsDate = new Date();
            renderSpecs(); refreshAll();
        } else { alert("خطأ في البيانات!"); }
    }

    // --- إدارة البيانات ---
    function addSpec() {
        let n = document.getElementById('specNameIn').value;
        if(n) { db.specs.push({id: Date.now(), name: n}); save(); renderSpecs(); }
    }

    function renderSpecs() {
        let ui = document.getElementById('specUI'), f = document.getElementById('specFilter');
        ui.innerHTML = ''; f.innerHTML = '';
        db.specs.forEach(s => {
            ui.innerHTML += `<div class="item-row"><span>${s.name}</span>
                <div>
                    <button class="action-btn btn-edit-modern" onclick="editSpec(${s.id})">✎</button>
                    <button class="action-btn btn-del-modern" onclick="delSpec(${s.id})">🗑</button>
                </div></div>`;
            f.innerHTML += `<option value="${s.id}">${s.name}</option>`;
        });
        renderTrainees();
    }

    function editSpec(id) {
        let s = db.specs.find(x => x.id == id);
        let n = prompt("تعديل التخصص:", s.name);
        if(n) { s.name = n; save(); renderSpecs(); }
    }

    function delSpec(id) {
        if(confirm("سيتم حذف كل المتربصين في هذا التخصص! هل أنت متأكد؟")) {
            db.specs = db.specs.filter(x => x.id != id);
            db.trainees = db.trainees.filter(x => x.specId != id);
            save(); renderSpecs();
        }
    }

    function addTrainee() {
        let n = document.getElementById('traineeNameIn').value, p = document.getElementById('traineePhoneIn').value, s = document.getElementById('specFilter').value;
        if(n && s) { db.trainees.push({id: Date.now(), name: n, phone: p, specId: s}); save(); renderTrainees(); }
    }

    function renderTrainees() {
        let sid = document.getElementById('specFilter').value, ui = document.getElementById('traineeUI'), sel = document.getElementById('traineeSelect');
        ui.innerHTML = ''; sel.innerHTML = '';
        db.trainees.filter(t => t.specId == sid).forEach(t => {
            ui.innerHTML += `<div class="item-row"><span>${t.name}</span>
                <div>
                    <button class="action-btn btn-edit-modern" onclick="editTrainee(${t.id})">✎</button>
                    <button class="action-btn btn-del-modern" onclick="delTrainee(${t.id})">🗑</button>
                </div></div>`;
            sel.innerHTML += `<option value="${t.id}">${t.name}</option>`;
        });
    }

    function editTrainee(id) {
        let t = db.trainees.find(x => x.id == id);
        let n = prompt("تعديل الاسم:", t.name), p = prompt("تعديل الهاتف:", t.phone);
        if(n) { t.name = n; t.phone = p; save(); renderTrainees(); refreshAll(); }
    }

    function delTrainee(id) {
        if(confirm("حذف المتربص؟")) {
            db.trainees = db.trainees.filter(x => x.id != id);
            db.logs = db.logs.filter(x => x.tId != id);
            save(); renderTrainees(); refreshAll();
        }
    }

    // --- الحضور والرسوم ---
    function record(p, s) {
        let tid = document.getElementById('traineeSelect').value, d = document.getElementById('targetDate').value;
        if(!tid || !d) return;
        let l = db.logs.find(x => x.tId == tid && x.date == d);
        if(!l) { l = {tId: tid, date: d, AM: '-', PM: '-'}; db.logs.push(l); }
        l[p] = s; save(); refreshAll();
    }

    function refreshAll() { updateChart(); renderAlerts(); }

    function updateChart() {
        let d = document.getElementById('targetDate').value, logs = db.logs.filter(x => x.date === d);
        let p = 0, ab = 0;
        logs.forEach(l => { if(l.AM==='حاضر')p++; if(l.AM==='غائب')ab++; if(l.PM==='حاضر')p++; if(l.PM==='غائب')ab++; });
        let ctx = document.getElementById('dailyChart').getContext('2d');
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, { type: 'doughnut', data: { labels: ['حاضر', 'غائب'], datasets: [{ data: [p, ab], backgroundColor: ['#27ae60', '#c0392b'] }] } });
    }

    function renderAlerts() {
        let ui = document.getElementById('alertUI'); ui.innerHTML = '';
        let counts = {};
        db.logs.forEach(l => { if(l.AM==='غائب') counts[l.tId]=(counts[l.tId]||0)+1; if(l.PM==='غائب') counts[l.tId]=(counts[l.tId]||0)+1; });
        for(let id in counts) {
            if(counts[id] >= 3) {
                let t = db.trainees.find(x => x.id == id);
                if(t) {
                    let msg = encodeURIComponent(`*مركز أحمد زبانة*\nإشعار غياب للمتربص: *${t.name}* (${counts[id]} فترات).`);
                    ui.innerHTML += `<div class="item-row" style="background:#fff5f5"><span>${t.name} (${counts[id]})</span>
                    <div><a class="wa-btn" href="https://wa.me/${t.phone}?text=${msg}" target="_blank">واتساب</a></div></div>`;
                }
            }
        }
    }
</script>
</body>
</html>
