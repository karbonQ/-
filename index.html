<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الاستدعاءات - المسح الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --p: #2c3e50; --s: #27ae60; --d: #e74c3c; --w: #2b579a; }
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; padding: 20px; direction: rtl; }
        .container { max-width: 650px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; color: var(--p); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; font-family: 'Cairo'; box-sizing: border-box; }
        button { color: white; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        .btn-blue { background: var(--p); }
        .btn-green { background: var(--s); }
        .btn-red { background: var(--d); }
        .alert-row { background: #fff5f5; border-right: 5px solid var(--d); padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; }
        .btn-download { background: var(--w); width: auto; padding: 8px 20px; font-size: 0.9rem; }
        .control-group { display: flex; gap: 10px; }
        .card { background: #fafafa; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee; }
    </style>

    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

<div class="container">
    <h2>نظام تسيير الاستدعاءات</h2>
    
    <div id="loginArea">
        <input type="password" id="pass" placeholder="كلمة المرور (1234)">
        <button class="btn-blue" onclick="login()">دخول</button>
    </div>

    <div id="mainArea" style="display:none;">
        <div class="card">
            <label><b>إضافة متربص جديد:</b></label>
            <input type="text" id="tName" placeholder="الاسم واللقب">
            <button class="btn-green" onclick="addTrainee()">حفظ المتربص</button>
        </div>
        
        <div class="card">
            <label><b>إدارة غياب التاريخ المختار:</b></label>
            <input type="date" id="attDate">
            
            <select id="tSelect"></select>
            
            <div class="control-group">
                <button class="btn-blue" onclick="mark()">تسجيل غياب</button>
                <button class="btn-red" onclick="deleteBySelectedDate()">مسح تسجيلات هذا التاريخ</button>
            </div>
            <p style="font-size: 0.8rem; color: #666; text-align: center; margin-top: 5px;">
                * زر المسح سيحذف كافة غيابات المتربصين في التاريخ المختار أعلاه.
            </p>
        </div>
        
        <hr>
        
        <h3>الاستدعاءات المستحقة (>3 غيابات)</h3>
        <div id="alerts"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('sys_v13_final')) || { students: [], logs: [] };

    function login() {
        if(document.getElementById('pass').value === '1234') {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainArea').style.display = 'block';
            document.getElementById('attDate').valueAsDate = new Date();
            render();
        } else { alert("كلمة المرور 1234"); }
    }

    function addTrainee() {
        let n = document.getElementById('tName').value.trim();
        if(n) { 
            db.students.push({id: Date.now(), name: n}); 
            save(); render(); 
            document.getElementById('tName').value = ''; 
        }
    }

    function mark() {
        let id = document.getElementById('tSelect').value;
        let date = document.getElementById('attDate').value;
        if(id && date) { 
            // منع التكرار
            db.logs = db.logs.filter(l => !(l.id == id && l.date == date));
            db.logs.push({id: id, date: date}); 
            save(); render(); 
            alert("تم تسجيل الغياب لهذا اليوم"); 
        }
    }

    // الدالة المعدلة: تمسح بناءً على التاريخ المختار في خانة تسجيل الغياب
    function deleteBySelectedDate() {
        let targetDate = document.getElementById('attDate').value;
        if(!targetDate) return alert("يرجى اختيار التاريخ أولاً من خانة التاريخ");

        if(confirm(`هل أنت متأكد من حذف كافة الغيابات المسجلة بتاريخ: ${targetDate}؟`)) {
            let initialCount = db.logs.length;
            db.logs = db.logs.filter(l => l.date !== targetDate);
            let deletedCount = initialCount - db.logs.length;

            if(deletedCount > 0) {
                save(); render();
                alert(`تم بنجاح حذف ${deletedCount} تسجيل.`);
            } else {
                alert("لا توجد تسجيلات لهذا التاريخ لمسحها.");
            }
        }
    }

    function render() {
        document.getElementById('tSelect').innerHTML = db.students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        let list = document.getElementById('alerts');
        list.innerHTML = '';
        
        let counts = {};
        db.logs.forEach(l => counts[l.id] = (counts[l.id] || 0) + 1);
        
        for(let id in counts) {
            if(counts[id] >= 3) {
                let s = db.students.find(st => st.id == id);
                if(s) {
                    list.innerHTML += `<div class="alert-row">
                        <span><b>${s.name}</b> (${counts[id]} غيابات)</span>
                        <button class="btn-download" onclick="createDoc('${id}')">تحميل الوورد</button>
                    </div>`;
                }
            }
        }
    }

    function save() { localStorage.setItem('sys_v13_final', JSON.stringify(db)); }

    async function createDoc(id) {
        if (typeof window.docx === "undefined") return alert("المكتبة غير محملة");
        try {
            const student = db.students.find(s => s.id == id);
            const dates = db.logs.filter(l => l.id == id).map(l => l.date).join(" / ");
            const { Document, Packer, Paragraph, TextRun, AlignmentType } = window.docx;

            const doc = new Document({
                sections: [{
                    children: [
                        new Paragraph({ text: "الجمهورية الجزائرية الديمقراطية الشعبية", alignment: AlignmentType.CENTER }),
                        new Paragraph({ text: "وزارة التكوين والتعليم المهنيين", alignment: AlignmentType.CENTER }),
                        new Paragraph({ text: "\n" }),
                        new Paragraph({
                            children: [new TextRun({ text: "إشعار بتبليغ غيابات", bold: true, size: 32 })],
                            alignment: AlignmentType.CENTER,
                        }),
                        new Paragraph({ text: "\n" }),
                        new Paragraph({
                            children: [new TextRun({ text: "اسم المتربص: ", bold: true }), new TextRun({ text: student.name })],
                            alignment: AlignmentType.RIGHT
                        }),
                        new Paragraph({ text: "التواريخ: " + dates, alignment: AlignmentType.RIGHT }),
                        new Paragraph({ text: "\n" }),
                        new Paragraph({ children: [new TextRun({ text: "حرر في: " + new Date().toLocaleDateString('ar-DZ') })], alignment: AlignmentType.LEFT }),
                        new Paragraph({ children: [new TextRun({ text: "ختم الإدارة", bold: true })], alignment: AlignmentType.LEFT })
                    ],
                }],
            });

            const blob = await Packer.toBlob(doc);
            saveAs(blob, `استدعاء_${student.name}.docx`);
        } catch (err) { alert("خطأ في التوليد"); }
    }
</script>
</body>
</html>
