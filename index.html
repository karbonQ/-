<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الإدارة الشامل - نسخة الاستدعاءات الرسمية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2980b9; --success: #27ae60; --danger: #c0392b;
            --warning: #f39c12; --whatsapp: #25D366; --word: #2b579a;
            --bg: #f0f2f5; --card: #ffffff; --text: #2f3640;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h1, h2 { color: var(--primary); font-weight: 700; text-align: center; }
        label { font-weight: 600; display: block; margin-top: 10px; }

        input, select { font-family: 'Cairo', sans-serif; width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e1e4e8; border-radius: 10px; box-sizing: border-box; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { font-family: 'Cairo', sans-serif; padding: 10px 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; color: white; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-add { background: var(--primary); }
        .btn-present { background: var(--success); flex: 1; padding: 15px; }
        .btn-absent { background: var(--danger); flex: 1; padding: 15px; }

        .attendance-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-radius: 10px; margin-bottom: 8px; }
        .status-present { background: #d4edda; color: #155724; border-right: 5px solid var(--success); }
        .status-absent { background: #f8d7da; color: #721c24; border-right: 5px solid var(--danger); }

        .alert-item { background: #fff5f5; border: 1px solid #feb2b2; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .action-btns { display: flex; gap: 8px; }
        .wa-btn { background: var(--whatsapp); padding: 8px 12px; border-radius: 8px; text-decoration: none; color: white; font-size: 0.85rem; font-weight: bold; }
        .word-btn { background: var(--word); font-size: 0.85rem; }

        #loginPage { text-align: center; max-width: 400px; margin: 80px auto; }
        @media (min-width: 600px) { .alert-item { flex-direction: row; justify-content: space-between; } }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

<div id="loginPage" class="card">
    <h1>نظام تسيير الحضور والغياب</h1>
    <input type="text" id="user" placeholder="اسم المستخدم (admin)">
    <input type="password" id="pass" placeholder="كلمة المرور (1234)">
    <button class="btn-add" style="width:100%; padding: 15px;" onclick="login()">دخول</button>
</div>

<div id="mainApp" style="display:none;" class="container">
    <h1>لوحة الإدارة المركزية</h1>

    <div class="card">
        <h2>📁 تهيئة المتربصين</h2>
        <label>التخصص:</label>
        <div style="display:flex; gap:10px;">
            <select id="specList" onchange="updateTraineeList()"></select>
            <input type="text" id="specInput" placeholder="تخصص جديد...">
        </div>
        <div class="btn-group">
            <button class="btn-add" onclick="addSpec()">إضافة</button>
            <button style="background:var(--warning)" onclick="editSpec()">تعديل</button>
            <button style="background:var(--danger)" onclick="deleteSpec()">حذف</button>
        </div>
        <hr>
        <label>المتربص:</label>
        <div style="display:flex; flex-direction:column; gap:5px;">
            <select id="traineeList"></select>
            <input type="text" id="traineeInput" placeholder="اسم المتربص الكامل">
            <input type="text" id="traineePhone" placeholder="رقم الهاتف (213...)">
        </div>
        <div class="btn-group">
            <button class="btn-add" onclick="addTrainee()">إضافة متربص</button>
            <button style="background:var(--warning)" onclick="editTrainee()">تعديل</button>
            <button style="background:var(--danger)" onclick="deleteTrainee()">حذف</button>
        </div>
    </div>

    <div class="card">
        <h2>📅 تسجيل اليوم</h2>
        <input type="date" id="attDate" onchange="refreshView()">
        <input type="text" id="attNote" placeholder="ملاحظة...">
        <div style="display:flex; gap:15px; margin-top:10px;">
            <button class="btn-present" onclick="mark('حاضر')">حاضر</button>
            <button class="btn-absent" onclick="mark('غائب')">غائب</button>
        </div>
    </div>

    <div class="card">
        <h2>⚠️ تنبيهات الغيابات (>3)</h2>
        <div id="absenceAlerts"></div>
        <hr>
        <select id="filterSpec" onchange="refreshView()"><option value="">كل التخصصات</option></select>
        <div style="max-width: 280px; margin: auto;"><canvas id="myChart"></canvas></div>
        <input type="text" id="searchBox" placeholder="بحث بالاسم..." oninput="renderAttendance()">
        <div id="attendanceLogs"></div>
        
        <div style="margin-top: 20px; display: grid; gap: 10px;">
            <button style="background:#8e44ad;" onclick="exportExcel()">📥 تحميل تقرير Excel</button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="exportJSON()" style="background: var(--success);">📤 تصدير نسخة JSON</button>
                <button onclick="document.getElementById('importFile').click()" style="background: var(--warning);">📥 استيراد نسخة JSON</button>
                <input type="file" id="importFile" style="display:none" onchange="importJSON(event)">
            </div>
            <button onclick="logout()" style="background: #7f8c8d;">⬅️ خروج وإغلاق</button>
        </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('eduData_final_v4')) || { specs: [], trainees: [], attendance: [] };
    let chartInstance = null;

    function save() { localStorage.setItem('eduData_final_v4', JSON.stringify(data)); }

    function login() {
        if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === '1234') {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            init();
        } else alert("خطأ في البيانات");
    }

    function logout() { if(confirm("هل تريد الخروج؟")) location.reload(); }

    function init() {
        document.getElementById('attDate').valueAsDate = new Date();
        refreshSpecs(); refreshView();
    }

    function refreshView() { renderAttendance(); updateChart(); checkAbsenceAlerts(); }

    function addSpec() {
        let n = document.getElementById('specInput').value.trim();
        if(!n) return;
        data.specs.push({ id: Date.now(), name: n });
        document.getElementById('specInput').value = '';
        save(); refreshSpecs();
    }

    function refreshSpecs() {
        let h = data.specs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        document.getElementById('specList').innerHTML = h;
        document.getElementById('filterSpec').innerHTML = '<option value="">كل التخصصات</option>' + h;
        updateTraineeList();
    }

    function addTrainee() {
        let n = document.getElementById('traineeInput').value.trim(), p = document.getElementById('traineePhone').value.trim(), s = document.getElementById('specList').value;
        if(!n || !p || !s) return alert("يرجى ملء البيانات");
        data.trainees.push({ id: Date.now(), name: n, phone: p, specId: s });
        document.getElementById('traineeInput').value = ''; document.getElementById('traineePhone').value = '';
        save(); updateTraineeList();
    }

    function updateTraineeList() {
        let s = document.getElementById('specList').value;
        document.getElementById('traineeList').innerHTML = data.trainees.filter(t => t.specId == s).map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    }

    function mark(status) {
        let t = document.getElementById('traineeList').value, d = document.getElementById('attDate').value, n = document.getElementById('attNote').value.trim();
        if(!t || !d) return alert("اختر المتربص");
        data.attendance = data.attendance.filter(a => !(a.tId == t && a.date == d));
        data.attendance.push({ tId: t, date: d, status: status, note: n });
        save(); refreshView();
    }

    function renderAttendance() {
        let d = document.getElementById('attDate').value, s = document.getElementById('searchBox').value.toLowerCase(), f = document.getElementById('filterSpec').value;
        let html = '';
        data.attendance.filter(a => a.date === d).forEach(log => {
            let t = data.trainees.find(tr => tr.id == log.tId);
            if(t && (!f || t.specId == f) && t.name.toLowerCase().includes(s)) {
                html += `<div class="attendance-row ${log.status === 'حاضر' ? 'status-present' : 'status-absent'}">
                            <span><b>${t.name}</b><br><small>${log.note || ''}</small></span>
                            <span>${log.status}</span>
                         </div>`;
            }
        });
        document.getElementById('attendanceLogs').innerHTML = html || '<p style="text-align:center">لا يوجد سجلات</p>';
    }

    function checkAbsenceAlerts() {
        const container = document.getElementById('absenceAlerts'); container.innerHTML = '';
        const m = new Date().getMonth(), y = new Date().getFullYear();
        let map = {};
        data.attendance.forEach(l => {
            let d = new Date(l.date);
            if(l.status === 'غائب' && d.getMonth() === m && d.getFullYear() === y) map[l.tId] = (map[l.tId] || 0) + 1;
        });

        for(let id in map) {
            if(map[id] >= 3) {
                let t = data.trainees.find(tr => tr.id == id);
                if(t) {
                    let msg = `المتربص ${t.name} غاب ${map[id]} أيام. يرجى التقرب من الإدارة.`;
                    container.innerHTML += `
                        <div class="alert-item">
                            <span><strong>${t.name}</strong> (${map[id]} غيابات)</span>
                            <div class="action-btns">
                                <a href="https://wa.me/${t.phone}?text=${encodeURIComponent(msg)}" target="_blank" class="wa-btn">واتساب</a>
                                <button onclick="generateWordCall('${id}')" class="word-btn">ملف Word</button>
                            </div>
                        </div>`;
                }
            }
        }
    }

    async function generateWordCall(tId) {
        try {
            const t = data.trainees.find(tr => tr.id == tId);
            const s = data.specs.find(sp => sp.id == t.specId);
            const absences = data.attendance.filter(a => a.tId == tId && a.status === 'غائب' && new Date(a.date).getMonth() === new Date().getMonth()).map(a => a.date);

            if (typeof docx === 'undefined') return alert("المكتبة قيد التحميل، يرجى المحاولة بعد ثوانٍ.");

            const { Document, Packer, Paragraph, TextRun, AlignmentType } = docx;
            const doc = new Document({
                sections: [{
                    children: [
                        new Paragraph({ text: "الجمهورية الجزائرية الديمقراطية الشعبية", alignment: AlignmentType.CENTER }),
                        new Paragraph({ text: "وزارة التكوين والتعليم المهنيين", alignment: AlignmentType.CENTER }),
                         new Paragraph({ text: "مديرية التكوين والتعليم المهنيين", alignment: AlignmentType.CENTER }),
                         new Paragraph({ text: "مركز التكوين و التمهين الشهيد أحمد زبانة السوقر1 ", alignment: AlignmentType.CENTER }),
                         new Paragraph({ text: "", alignment: AlignmentType.CENTER }),
                         new Paragraph({ text: "\n الى السيد:المراقب العام تحت اشراف السيد رئيس مصلحة التكوين الحضوري", bold: true, alignment: AlignmentType.LEFT }),
                          new Paragraph({ text: "\n إشعار بغياب غير نظامي ", bold: true, alignment: AlignmentType.CENTER }),
                        new Paragraph({ text: `:المتربص ${t.name}`, alignment: AlignmentType.RIGHT }),
                        new Paragraph({ text: `:التخصص ${s ? s.name : '-'}`, alignment: AlignmentType.RIGHT }),
                        new Paragraph({ text: `:لقد سجل المعني غيابات في التواريخ ${absences.join(" + ")}`, alignment: AlignmentType.RIGHT }),
                         new Paragraph({ text: "", alignment: AlignmentType.CENTER }),
                        new Paragraph({ text: `\nيرجى منكم اتخاذ القرارات الادارية المناسبة .`, alignment: AlignmentType.RIGHT }),
                         new Paragraph({ text: "", alignment: AlignmentType.CENTER }),
                        new Paragraph({ text: `\nحرر في: ${new Date().toLocaleDateString()}`, alignment: AlignmentType.LEFT }),
                    ]
                }]
            });

            const blob = await Packer.toBlob(doc);
            saveAs(blob, `استدعاء_${t.name}.docx`);
        } catch (e) { alert("حدث خطأ، تأكد من أنك تفتح الملف في متصفح حديث."); }
    }

    function updateChart() {
        let d = document.getElementById('attDate').value, logs = data.attendance.filter(a => a.date === d);
        let p = logs.filter(a => a.status === 'حاضر').length, ab = logs.filter(a => a.status === 'غائب').length;
        if(chartInstance) chartInstance.destroy();
        if(p+ab > 0) chartInstance = new Chart(document.getElementById('myChart'), { type: 'doughnut', data: { labels: ['حاضر', 'غائب'], datasets: [{ data: [p, ab], backgroundColor: ['#27ae60', '#c0392b'] }] } });
    }

    function exportExcel() {
        let report = data.attendance.map(a => { let t = data.trainees.find(tr => tr.id == a.tId); return { "التاريخ": a.date, "الاسم": t?t.name:"", "الحالة": a.status }; });
        XLSX.writeFile(XLSX.utils.book_new(), "Report.xlsx");
    }

    function exportJSON() { saveAs(new Blob([JSON.stringify(data)], {type: "application/json"}), "backup.json"); }
    function importJSON(e) { let r = new FileReader(); r.onload = f => { data = JSON.parse(f.target.result); save(); location.reload(); }; r.readAsText(e.target.files[0]); }
</script>
</body>
</html>
