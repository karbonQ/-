<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الحضور والغياب</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2980b9;
            --success: #27ae60;
            --danger: #c0392b;
            --warning: #f39c12;
            --whatsapp: #25D366;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #2f3640;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            line-height: 1.6;
        }

        .container { max-width: 900px; margin: 0 auto; }
        
        .card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            margin-bottom: 25px; 
        }

        h1, h2, h3 { color: var(--primary); margin-top: 0; font-weight: 700; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 1.8rem; }
        h2 { border-bottom: 2px solid var(--bg); padding-bottom: 10px; font-size: 1.4rem; }

        label { font-weight: 600; display: block; margin-top: 10px; }

        input, select { 
            font-family: 'Cairo', sans-serif;
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 2px solid #e1e4e8; 
            border-radius: 10px; 
            box-sizing: border-box; 
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        
        button { 
            font-family: 'Cairo', sans-serif;
            padding: 10px 15px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: 0.3s; 
            color: white; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-add { background: var(--primary); }
        .btn-edit { background: var(--warning); }
        .btn-delete { background: var(--danger); }
        .btn-present { background: var(--success); flex: 1; padding: 15px; font-size: 1.1rem; }
        .btn-absent { background: var(--danger); flex: 1; padding: 15px; font-size: 1.1rem; }

        .attendance-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 20px; 
            border-radius: 10px; 
            margin-bottom: 8px; 
        }

        .status-present { background: #d4edda; color: #155724; border-right: 5px solid var(--success); }
        .status-absent { background: #f8d7da; color: #721c24; border-right: 5px solid var(--danger); }

        .chart-box { max-width: 320px; margin: 20px auto; }
        
        #loginPage { text-align: center; max-width: 400px; margin: 80px auto; }

        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }

        .alert-item {
            background: #fff5f5; 
            border: 1px solid #feb2b2; 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            display: flex; 
            flex-direction: column;
            gap: 10px;
        }

        .wa-btn {
            background: var(--whatsapp);
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            font-size: 0.9rem;
        }

        @media (min-width: 600px) {
            .alert-item { flex-direction: row; justify-content: space-between; align-items: center; }
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div id="loginPage" class="card">
    <h1>برنامج تسيير حضور/غياب المتربصين </h1>
    <p>يرجى إدخال اسم المستخدم و كلمة المرور</p>
    <input type="text" id="user" placeholder="اسم المستخدم ">
    <input type="password" id="pass" placeholder="كلمة المرور ">
    <button class="btn-add" style="width:100%; padding: 15px;" onclick="login()">دخول </button>
</div>

<div id="mainApp" style="display:none;" class="container">
    <h1>    </h1>
<h1>    </h1>
    <h1>    </h1>
    <div class="card">
        <h2>  التخصصات و المتربصين</h2>
        <label>التخصص:</label>
        <div style="display:flex; gap:10px;">
            <select id="specList" onchange="updateTraineeList()"></select>
            <input type="text" id="specInput" placeholder="تخصص جديد..." style="margin:0">
        </div>
        <div class="btn-group">
            <button class="btn-add" onclick="addSpec()">إضافة</button>
            <button class="btn-edit" onclick="editSpec()">تعديل</button>
            <button class="btn-delete" onclick="deleteSpec()">حذف</button>
        </div>
        <hr>
        <label>بيانات المتربص الجديد:</label>
        <div style="display:flex; flex-direction:column; gap:5px;">
            <select id="traineeList"></select>
            <input type="text" id="traineeInput" placeholder="اسم المتربص الكامل...">
            <input type="text" id="traineePhone" placeholder="رقم الهاتف (مثال: 213660000000)">
        </div>
        <div class="btn-group">
            <button class="btn-add" onclick="addTrainee()">إضافة متربص</button>
            <button class="btn-edit" onclick="editTrainee()">تعديل</button>
            <button class="btn-delete" onclick="deleteTrainee()">حذف</button>
        </div>
    </div>

    <div class="card">
        <h2> تسجيل الحضور اليومي</h2>
        <label>التاريخ:</label>
        <input type="date" id="attDate" onchange="refreshView()">
        
        <label>ملاحظات إضافية:</label>
        <input type="text" id="attNote" placeholder="سبب الغياب أو ملاحظة للمشرف...">

        <div style="display:flex; gap:15px; margin-top:10px;">
            <button class="btn-present" onclick="mark('حاضر')">✔ تسجيل حضور</button>
            <button class="btn-absent" onclick="mark('غائب')">✖ تسجيل غياب</button>
        </div>
    </div>

    <div class="card">
        <h2> الإحصائيات و إشعارات الغياب</h2>
        
        <div style="display:flex; gap:10px; margin-bottom: 15px;">
            <select id="filterSpec" onchange="refreshView()" style="flex:1">
                <option value="">جميع التخصصات</option>
            </select>
        </div>

        <div class="chart-box"><canvas id="myChart"></canvas></div>

        <div id="alertSection">
            <h3 style="color: var(--danger); font-size: 1.1rem;">⚠️ تنبيه: المتربصين الذين تجاوز 3 غيابات (هذا الشهر)</h3>
            <div id="absenceAlerts"></div>
        </div>

        <hr>
        <h3>سجل الحضور :</h3>
        <input type="text" id="searchBox" placeholder="بحث" oninput="renderAttendance()">
        <div id="attendanceLogs" style="margin-top:15px;"></div>
        
        <div style="margin-top: 25px; display: flex; flex-direction: column; gap: 12px;">
            <button style="background:#8e44ad;" onclick="exportExcel()">📥 تصدير تقرير Excel للغلق</button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="exportJSON()" style="background: #27ae60;">📤 حفظ نسخة JSON</button>
                <button onclick="document.getElementById('importFile').click()" style="background: #e67e22;">📥 استيراد نسخة JSON</button>
                <input type="file" id="importFile" style="display:none" onchange="importJSON(event)">
            </div>
        </div>

        <div style="margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px;">
            <button onclick="logout()" style="background: #7f8c8d; width: 100%; padding: 12px;">
                 تسجيل الخروج  
            </button>
        </div>
    </div>
</div>

<script>
    // تهيئة البيانات (v3 لضمان عدم التداخل مع النسخ القديمة)
    let data = JSON.parse(localStorage.getItem('eduData_v3')) || { specs: [], trainees: [], attendance: [] };
    let chartInstance = null;

    function save() { localStorage.setItem('eduData_v3', JSON.stringify(data)); }

    function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === 'admin' && p === '1234') {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            init();
        } else { alert("خطأ في بيانات الدخول!"); }
    }

    function logout() {
        if(confirm("هل تريد تسجيل الخروج؟")) {
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('user').value = '';
            document.getElementById('pass').value = '';
            window.scrollTo(0,0);
        }
    }

    function init() {
        document.getElementById('attDate').valueAsDate = new Date();
        refreshSpecs();
        refreshView();
    }

    function refreshView() {
        renderAttendance();
        updateChart();
        checkAbsenceAlerts();
    }

    // إدارة التخصصات
    function addSpec() {
        let name = document.getElementById('specInput').value.trim();
        if(!name) return;
        data.specs.push({ id: Date.now(), name: name });
        document.getElementById('specInput').value = '';
        save(); refreshSpecs();
    }

    function refreshSpecs() {
        let html = data.specs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        document.getElementById('specList').innerHTML = html;
        document.getElementById('filterSpec').innerHTML = '<option value="">جميع التخصصات</option>' + html;
        updateTraineeList();
    }

    function editSpec() {
        let id = document.getElementById('specList').value;
        if(!id) return;
        let newName = prompt("تعديل اسم التخصص:", data.specs.find(s=>s.id == id).name);
        if(newName) { data.specs.find(s => s.id == id).name = newName; save(); refreshSpecs(); }
    }

    function deleteSpec() {
        let id = document.getElementById('specList').value;
        if(!id || !confirm("سيؤدي هذا لحذف التخصص والمتربصين التابعين له!")) return;
        data.specs = data.specs.filter(s => s.id != id);
        data.trainees = data.trainees.filter(t => t.specId != id);
        save(); refreshSpecs();
    }

    // إدارة المتربصين
    function addTrainee() {
        let name = document.getElementById('traineeInput').value.trim();
        let phone = document.getElementById('traineePhone').value.trim();
        let specId = document.getElementById('specList').value;
        if(!name || !specId || !phone) return alert("يرجى إكمال كافة البيانات (الاسم ورقم الهاتف)");
        
        data.trainees.push({ id: Date.now(), name: name, phone: phone, specId: specId });
        document.getElementById('traineeInput').value = '';
        document.getElementById('traineePhone').value = '';
        save(); updateTraineeList();
    }

    function updateTraineeList() {
        let specId = document.getElementById('specList').value;
        let trainees = data.trainees.filter(t => t.specId == specId);
        document.getElementById('traineeList').innerHTML = trainees.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    }

    function editTrainee() {
        let id = document.getElementById('traineeList').value;
        if(!id) return;
        let t = data.trainees.find(tr => tr.id == id);
        let newName = prompt("تعديل الاسم:", t.name);
        let newPhone = prompt("تعديل الهاتف:", t.phone);
        if(newName) t.name = newName;
        if(newPhone) t.phone = newPhone;
        save(); updateTraineeList();
    }

    function deleteTrainee() {
        let id = document.getElementById('traineeList').value;
        if(!id || !confirm("حذف المتربص؟")) return;
        data.trainees = data.trainees.filter(t => t.id != id);
        save(); updateTraineeList();
    }

    // منطق الحضور والغياب
    function mark(status) {
        let tId = document.getElementById('traineeList').value;
        let date = document.getElementById('attDate').value;
        let note = document.getElementById('attNote').value.trim();
        if(!tId || !date) return alert("يرجى اختيار متربص");

        data.attendance = data.attendance.filter(a => !(a.tId == tId && a.date == date));
        data.attendance.push({ tId: tId, date: date, status: status, note: note });
        
        document.getElementById('attNote').value = '';
        save(); refreshView();
    }

    function renderAttendance() {
        let date = document.getElementById('attDate').value;
        let search = document.getElementById('searchBox').value.toLowerCase();
        let filter = document.getElementById('filterSpec').value;
        let html = '';

        data.attendance.filter(a => a.date === date).forEach(log => {
            let t = data.trainees.find(tr => tr.id == log.tId);
            if(t && (!filter || t.specId == filter) && t.name.toLowerCase().includes(search)) {
                let cls = log.status === 'حاضر' ? 'status-present' : 'status-absent';
                html += `<div class="attendance-row ${cls}">
                            <span><b>${t.name}</b>${log.note ? '<br><small>📝 ' + log.note + '</small>' : ''}</span>
                            <span>${log.status}</span>
                         </div>`;
            }
        });
        document.getElementById('attendanceLogs').innerHTML = html || '<p style="text-align:center; color:#999;">لا توجد سجلات لهذا التاريخ</p>';
    }

    // تنبيهات الغياب والواتساب
    function checkAbsenceAlerts() {
        const container = document.getElementById('absenceAlerts');
        container.innerHTML = '';
        const month = new Date().getMonth();
        const year = new Date().getFullYear();
        let map = {};

        data.attendance.forEach(log => {
            let d = new Date(log.date);
            if (log.status === 'غائب' && d.getMonth() === month && d.getFullYear() === year) {
                map[log.tId] = (map[log.tId] || 0) + 1;
            }
        });

        let found = false;
        for (let tId in map) {
            if (map[tId] >= 3) {
                found = true;
                let t = data.trainees.find(tr => tr.id == tId);
                if (t) {
                    let msg = `السيد ولي أمر المتربص ${t.name}، نحيطكم علماً بأن المتربص قد سجل ${map[tId]} غيابات خلال هذا الشهر. يرجى التواصل مع الإدارة لتبرير الغياب.`;
                    let url = `https://wa.me/${t.phone}?text=${encodeURIComponent(msg)}`;
                    
                    container.innerHTML += `
                        <div class="alert-item">
                            <span><strong>${t.name}</strong> غاب ${map[tId]} أيام</span>
                            <a href="${url}" target="_blank" class="wa-btn">💬 مراسلة الولي</a>
                        </div>`;
                }
            }
        }
        if(!found) container.innerHTML = '<p style="color:var(--success); text-align:center;">✅ لا توجد غيابات متكررة حالياً</p>';
    }

    function updateChart() {
        let date = document.getElementById('attDate').value;
        let filter = document.getElementById('filterSpec').value;
        let daily = data.attendance.filter(a => a.date === date);
        if(filter) daily = daily.filter(a => { let t = data.trainees.find(tr => tr.id == a.tId); return t && t.specId == filter; });

        let p = daily.filter(a => a.status === 'حاضر').length;
        let ab = daily.filter(a => a.status === 'غائب').length;

        if(chartInstance) chartInstance.destroy();
        if(p+ab > 0) {
            chartInstance = new Chart(document.getElementById('myChart'), {
                type: 'doughnut',
                data: { labels: ['حاضر', 'غائب'], datasets: [{ data: [p, ab], backgroundColor: ['#27ae60', '#c0392b'] }] },
                options: { plugins: { legend: { labels: { font: { family: 'Cairo' } } } } }
            });
        }
    }

    // الوظائف التقنية (Excel & JSON)
    function exportExcel() {
        let report = data.attendance.map(a => {
            let t = data.trainees.find(tr => tr.id == a.tId);
            let s = data.specs.find(sp => sp.id == (t ? t.specId : null));
            return { "التاريخ": a.date, "المتربص": t?t.name:"محذوف", "الهاتف": t?t.phone:"", "التخصص": s?s.name:"", "الحالة": a.status, "ملاحظات": a.note||"" };
        });
        const ws = XLSX.utils.json_to_sheet(report);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Attendance_Report");
        XLSX.writeFile(wb, `Report_${new Date().toLocaleDateString()}.xlsx`);
    }

    function exportJSON() {
        let blob = new Blob([JSON.stringify(data)], {type: "application/json"});
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url; a.download = 'attendance_backup.json'; a.click();
    }

    function importJSON(e) {
        let reader = new FileReader();
        reader.onload = function(f) { 
            try {
                data = JSON.parse(f.target.result); 
                save(); location.reload(); 
            } catch(err) { alert("خطأ في قراءة الملف"); }
        };
        reader.readAsText(e.target.files[0]);
    }
</script>
</body>
</html>
