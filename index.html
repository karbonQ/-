<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق حضور وغياب مصحح</title>
<style>
body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f0f2f5; color:#333; margin:0; padding:0; direction:rtl;}
.centered { display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh;}
.container { max-width:950px; margin:20px auto; background:#fff; padding:25px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1);}
h1,h2,h3{text-align:center;margin-bottom:10px;}
input,select,button{padding:8px 12px;margin:5px 0;border-radius:5px;border:1px solid #ccc;}
button{cursor:pointer;border:none;background-color:#4CAF50;color:white;transition:0.3s;}
button:hover{background-color:#45a049;}
.button-group{display:flex;gap:10px;margin-top:5px; flex-wrap:wrap;}
.actions{display:flex;gap:10px;margin-top:10px; flex-wrap:wrap;}
.presentBtn{background-color:#4CAF50;}
.absentBtn{background-color:#F44336;}
.presentBtn:hover{background-color:#45a049;}
.absentBtn:hover{background-color:#e53935;}
ul{list-style:none;padding:0;}
ul li{background:#f9f9f9;margin:5px 0;padding:8px 10px;border-radius:5px;}
.chart-container{width:100%; max-width:500px; margin:20px auto;}
section{margin-bottom:20px;}
</style>
</head>
<body>

<div id="loginPage" class="centered">
    <h2>تسجيل الدخول</h2>
    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button id="loginBtn">دخول</button>
</div>

<div id="app" style="display:none;" class="container">
    <header>
        <h1>تسجيل الحضور/الغياب</h1>
    </header>

    <section>
        <label>اختر التخصص:</label>
        <select id="specialtySelect"></select>
        <input type="text" id="newSpecialty" placeholder="إضافة تخصص جديد">
        <div class="button-group">
            <button id="addSpecialtyBtn">إضافة</button>
            <button id="editSpecialtyBtn">✏ تعديل</button>
            <button id="deleteSpecialtyBtn">🗑 حذف</button>
        </div>
    </section>

    <section>
        <label>اختر المتربص:</label>
        <select id="traineeSelect"></select>
        <input type="text" id="nameInput" placeholder="اسم المتربص">
        <div class="button-group">
            <button id="addTraineeBtn">إضافة</button>
            <button id="editTraineeBtn">✏ تعديل</button>
            <button id="deleteTraineeBtn">🗑 حذف</button>
        </div>
    </section>

    <section>
        <label>تاريخ تسجيل الحضور/الغياب:</label>
        <input type="date" id="attendanceDate">
        <div class="actions">
            <button class="presentBtn" id="presentBtn">✔ حضور</button>
            <button class="absentBtn" id="absentBtn">✖ غياب</button>
        </div>
    </section>

    <section>
        <h3>بحث وتصفية السجلات</h3>
        <input type="text" id="searchTrainee" placeholder="بحث عن متربص">
        <select id="filterSpecialty"><option value="">كل التخصصات</option></select>
    </section>

    <section class="chart-container">
        <h3>📊 إحصائيات الحضور اليوم</h3>
        <canvas id="attendanceChart"></canvas>
    </section>

    <section>
        <h3>سجل الحضور/الغياب</h3>
        <ul id="attendanceList"></ul>
        <button id="exportCSVBtn">تصدير CSV</button>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function(){
    const loginBtn = document.getElementById("loginBtn");
    const loginPage = document.getElementById("loginPage");
    const app = document.getElementById("app");

    const specialtySelect = document.getElementById("specialtySelect");
    const newSpecialty = document.getElementById("newSpecialty");
    const addSpecialtyBtn = document.getElementById("addSpecialtyBtn");
    const editSpecialtyBtn = document.getElementById("editSpecialtyBtn");
    const deleteSpecialtyBtn = document.getElementById("deleteSpecialtyBtn");

    const traineeSelect = document.getElementById("traineeSelect");
    const nameInput = document.getElementById("nameInput");
    const addTraineeBtn = document.getElementById("addTraineeBtn");
    const editTraineeBtn = document.getElementById("editTraineeBtn");
    const deleteTraineeBtn = document.getElementById("deleteTraineeBtn");

    const attendanceDate = document.getElementById("attendanceDate");
    const presentBtn = document.getElementById("presentBtn");
    const absentBtn = document.getElementById("absentBtn");
    const attendanceList = document.getElementById("attendanceList");
    const exportCSVBtn = document.getElementById("exportCSVBtn");

    const searchTrainee = document.getElementById("searchTrainee");
    const filterSpecialty = document.getElementById("filterSpecialty");

    let specialties = JSON.parse(localStorage.getItem("specialties")) || [];
    let trainees = JSON.parse(localStorage.getItem("trainees")) || {};
    let attendanceRecords = JSON.parse(localStorage.getItem("attendanceRecords")) || {};
    let chart;

    loginBtn.addEventListener("click", function(){
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        if(username==="admin" && password==="1234"){
            loginPage.style.display="none";
            app.style.display="block";
            loadSpecialties();
            updateFilterSpecialty();
        } else { alert("اسم المستخدم أو كلمة المرور خاطئة"); }
    });

    function loadSpecialties(){
        specialtySelect.innerHTML="";
        specialties.forEach(spec=>{
            const opt = document.createElement("option");
            opt.textContent = spec;
            specialtySelect.appendChild(opt);
        });
        if(specialties.length>0) loadTrainees(specialtySelect.value);
        localStorage.setItem("specialties", JSON.stringify(specialties));
    }

    addSpecialtyBtn.addEventListener("click", ()=>{
        const spec = newSpecialty.value.trim();
        if(spec && !specialties.includes(spec)){
            specialties.push(spec);
            newSpecialty.value = "";
            loadSpecialties();
            updateFilterSpecialty();
        }
    });

    editSpecialtyBtn.addEventListener("click", ()=>{
        const index = specialtySelect.selectedIndex;
        if(index>=0){
            const name = prompt("أدخل الاسم الجديد للتخصص", specialties[index]);
            if(name){
                const old = specialties[index];
                specialties[index]=name;
                if(trainees[old]){
                    trainees[name]=trainees[old];
                    delete trainees[old];
                    localStorage.setItem("trainees", JSON.stringify(trainees));
                }
                loadSpecialties();
                updateFilterSpecialty();
            }
        }
    });

    deleteSpecialtyBtn.addEventListener("click", ()=>{
        const index = specialtySelect.selectedIndex;
        if(index>=0){
            const spec = specialties[index];
            specialties.splice(index,1);
            delete trainees[spec];
            localStorage.setItem("trainees", JSON.stringify(trainees));
            loadSpecialties();
            updateFilterSpecialty();
        }
    });

    function loadTrainees(spec){
        traineeSelect.innerHTML="";
        if(!trainees[spec]) trainees[spec]=[];
        trainees[spec].forEach(name=>{
            const opt = document.createElement("option");
            opt.textContent=name;
            traineeSelect.appendChild(opt);
        });
        localStorage.setItem("trainees", JSON.stringify(trainees));
    }

    specialtySelect.addEventListener("change", ()=>loadTrainees(specialtySelect.value));

    addTraineeBtn.addEventListener("click", ()=>{
        const spec = specialtySelect.value;
        if(!spec) return alert("اختر التخصص أولاً");
        const name = nameInput.value.trim();
        if(!name) return alert("أدخل اسم المتربص");
        if(!trainees[spec]) trainees[spec]=[];
        if(!trainees[spec].includes(name)){
            trainees[spec].push(name);
            nameInput.value="";
            loadTrainees(spec);
        } else { alert("المتربص موجود بالفعل"); }
    });

    editTraineeBtn.addEventListener("click", ()=>{
        const spec = specialtySelect.value;
        const index = traineeSelect.selectedIndex;
        if(index>=0){
            const name = prompt("أدخل الاسم الجديد", trainees[spec][index]);
            if(name){
                trainees[spec][index]=name;
                loadTrainees(spec);
            }
        }
    });

    deleteTraineeBtn.addEventListener("click", ()=>{
        const spec = specialtySelect.value;
        const index = traineeSelect.selectedIndex;
        if(index>=0){
            trainees[spec].splice(index,1);
            loadTrainees(spec);
        }
    });

    function renderAttendanceList(){
        const date = attendanceDate.value;
        const search = searchTrainee.value.trim().toLowerCase();
        const filterSpec = filterSpecialty.value;
        attendanceList.innerHTML="";

        if(attendanceRecords[date]){
            for(const [trainee,status] of Object.entries(attendanceRecords[date])){
                let include = true;
                if(filterSpec){
                    const found = trainees[filterSpec] && trainees[filterSpec].includes(trainee);
                    if(!found) include=false;
                }
                if(search && !trainee.toLowerCase().includes(search)) include=false;
                if(include){
                    const li = document.createElement("li");
                    li.textContent=`${trainee}: ${status}`;
                    attendanceList.appendChild(li);
                }
            }
        }
        renderChart();
        localStorage.setItem("attendanceRecords", JSON.stringify(attendanceRecords));
    }

    function markAttendance(status){
        const date = attendanceDate.value;
        const trainee = traineeSelect.value;
        if(!date || !trainee) return alert("اختر التاريخ والمتربص أولاً");
        if(!attendanceRecords[date]) attendanceRecords[date]={};
        attendanceRecords[date][trainee]=status;
        renderAttendanceList();
    }

    presentBtn.addEventListener("click", ()=>markAttendance("حاضر"));
    absentBtn.addEventListener("click", ()=>markAttendance("غائب"));
    attendanceDate.addEventListener("change", renderAttendanceList);
    searchTrainee.addEventListener("input", renderAttendanceList);
    filterSpecialty.addEventListener("change", renderAttendanceList);

    function renderChart(){
        const date = attendanceDate.value;
        let present=0, absent=0;
        if(attendanceRecords[date]){
            Object.values(attendanceRecords[date]).forEach(s=>{
                if(s==="حاضر") present++;
                else absent++;
            });
        }
        const ctx = document.getElementById("attendanceChart").getContext("2d");
        if(chart) chart.destroy();
        chart=new Chart(ctx,{
            type:"doughnut",
            data:{labels:["حاضر","غائب"], datasets:[{data:[present, absent], backgroundColor:["#4CAF50","#F44336"]}]}
        });
    }

    exportCSVBtn.addEventListener("click", function(){
        let csv="التاريخ,المتربص,الحالة\n";
        for(const [date,records] of Object.entries(attendanceRecords)){
            for(const [trainee,status] of Object.entries(records)){
                csv+=`${date},${trainee},${status}\n`;
            }
        }
        const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
        const link=document.createElement("a");
        link.href=URL.createObjectURL(blob);
        link.download="attendance.csv";
        link.click();
    });

    function updateFilterSpecialty(){
        filterSpecialty.innerHTML='<option value="">كل التخصصات</option>';
        specialties.forEach(spec=>{
            const opt = document.createElement("option");
            opt.value = spec;
            opt.textContent = spec;
            filterSpecialty.appendChild(opt);
        });
    }
});
</script>
</body>
</html>
