<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الإدارة الشامل - نسخة الأزرار الظاهرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2980b9; --success: #27ae60; --danger: #c0392b; --edit: #f39c12; --dark: #2c3e50; }
        body { font-family: 'Cairo', sans-serif; background: #f4f7f9; margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--dark); text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        /* تنسيق المدخلات */
        input, select, button { font-family: 'Cairo'; width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        
        /* الأزرار الأساسية */
        .btn-main { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--success); color: white; border: none; }
        
        /* أزرار الإدارة (التعديل والحذف) - تأكدت أنها ستظهر بوضوح */
        .admin-controls { display: flex; gap: 5px; }
        .edit-btn { background: var(--edit) !important; color: white !important; width: 60px !important; padding: 5px !important; font-size: 0.8rem !important; cursor: pointer; border: none; border-radius: 5px; }
        .del-btn { background: var(--danger) !important; color: white !important; width: 60px !important; padding: 5px !important; font-size: 0.8rem !important; cursor: pointer; border: none; border-radius: 5px; }
        
        /* قائمة العناصر */
        .item-list { margin-top: 15px; border: 1px solid #eee; border-radius: 8px; max-height: 200px; overflow-y: auto; background: #fafafa; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .item-row:last-child { border-bottom: none; }
        
        .flex-row { display: flex; gap: 10px; }
        .wa-btn { background: #25D366; color: white; padding: 5px 10px; text-decoration: none; border-radius: 5px; font-size: 0.8rem; }
        .word-btn { background: #2b579a; color: white; padding: 5px 10px; border: none; border-radius: 5px; font-size: 0.8rem; cursor: pointer; }
    </style>

    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

<div class="container">
    <div id="loginSection" class="card" style="max-width: 400px; margin: 50px auto;">
        <h2>دخول النظام</h2>
        <input type="password" id="entryPass" placeholder="كلمة المرور">
        <button class="btn-main" onclick="checkPass()">دخول</button>
    </div>

    <div id="appBody" style="display:none;">
        <div class="card">
            <h2>📁 التخصصات</h2>
            <div class="flex-row">
                <input type="text" id="newSpecName" placeholder="اسم التخصص...">
                <button class="btn-main" style="width:100px" onclick="addNewSpec()">إضافة</button>
            </div>
            <div id="specUIList" class="item-list"></div>
        </div>

        <div class="card">
            <h2>👥 المتربصين</h2>
            <select id="activeSpecFilter" onchange="loadTrainees()"></select>
            <hr>
            <input type="text" id="newTraineeName" placeholder="اسم المتربص">
            <input type="text" id="newTraineePhone" placeholder="رقم الهاتف">
            <button class="btn-save" onclick="addNewTrainee()">حفظ المتربص</button>
            <div id="traineeUIList" class="item-list"></div>
        </div>

        <div class="card">
            <h2>📅 تسجيل الغياب</h2>
            <input type="date" id="workDate" onchange="updateAlerts()">
            <select id="traineeSelectBox"></select>
            <div class="flex-row">
                <button class="btn-save" style="background: var(--primary)" onclick="setAbsence('حاضر')">حاضر</button>
                <button class="btn-save" style="background: var(--danger)" onclick="setAbsence('غائب')">غائب</button>
            </div>
            <button style="background:#7f8c8d; color:white;" onclick="clearDay()">🗑️ مسح غيابات هذا التاريخ</button>
        </div>

        <div class="card">
            <h2>⚠️ قائمة الاستدعاءات</h2>
            <div id="alertBox"></div>
        </div>
    </div>
</div>

<script>
    let storage = JSON.parse(localStorage.getItem('abs_final_fix')) || { specs: [], students: [], logs: [] };

    function checkPass() {
        if(document.getElementById('entryPass').value === '1234') {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appBody').style.display = 'block';
            document.getElementById('workDate').valueAsDate = new Date();
            refreshSpecs();
        }
    }

    // إدارة التخصصات
    function addNewSpec() {
        let name = document.getElementById('newSpecName').value.trim();
        if(name) {
            storage.specs.push({ id: Date.now(), name: name });
            saveData(); refreshSpecs();
            document.getElementById('newSpecName').value = '';
        }
    }

    function refreshSpecs() {
        let listDiv = document.getElementById('specUIList');
        let selectFilter = document.getElementById('activeSpecFilter');
        listDiv.innerHTML = '';
        selectFilter.innerHTML = '';

        storage.specs.forEach(s => {
            listDiv.innerHTML += `
                <div class="item-row">
                    <span>${s.name}</span>
                    <div class="admin-controls">
                        <button class="edit-btn" onclick="renameSpec(${s.id})">تعديل</button>
                        <button class="del-btn" onclick="removeSpec(${s.id})">حذف</button>
                    </div>
                </div>`;
            selectFilter.innerHTML += `<option value="${s.id}">${s.name}</option>`;
        });
        loadTrainees();
    }

    function renameSpec(id) {
        let s = storage.specs.find(x => x.id == id);
        let n = prompt("الاسم الجديد للتخصص:", s.name);
        if(n) { s.name = n; saveData(); refreshSpecs(); }
    }

    function removeSpec(id) {
        if(confirm("سيتم حذف التخصص وكل متربصيه! هل أنت متأكد؟")) {
            storage.specs = storage.specs.filter(x => x.id != id);
            storage.students = storage.students.filter(x => x.sId != id);
            saveData(); refreshSpecs();
        }
    }

    // إدارة المتربصين
    function addNewTrainee() {
        let n = document.getElementById('newTraineeName').value.trim();
        let p = document.getElementById('newTraineePhone').value.trim();
        let s = document.getElementById('activeSpecFilter').value;
        if(n && s) {
            storage.students.push({ id: Date.now(), name: n, phone: p, sId: s });
            saveData(); loadTrainees();
            document.getElementById('newTraineeName').value = '';
        }
    }

    function loadTrainees() {
        let sId = document.getElementById('activeSpecFilter').value;
        let listDiv = document.getElementById('traineeUIList');
        let selectBox = document.getElementById('traineeSelectBox');
        listDiv.innerHTML = '';
        selectBox.innerHTML = '';

        let filtered = storage.students.filter(x => x.sId == sId);
        filtered.forEach(t => {
            listDiv.innerHTML += `
                <div class="item-row">
                    <span>${t.name}</span>
                    <div class="admin-controls">
                        <button class="edit-btn" onclick="renameTrainee(${t.id})">تعديل</button>
                        <button class="del-btn" onclick="removeTrainee(${t.id})">حذف</button>
                    </div>
                </div>`;
            selectBox.innerHTML += `<option value="${t.id}">${t.name}</option>`;
        });
        updateAlerts();
    }

    function renameTrainee(id) {
        let t = storage.students.find(x => x.id == id);
        let n = prompt("تعديل الاسم:", t.name);
        let p = prompt("تعديل الهاتف:", t.phone);
        if(n) { t.name = n; t.phone = p; saveData(); loadTrainees(); }
    }

    function removeTrainee(id) {
        if(confirm("حذف المتربص؟")) {
            storage.students = storage.students.filter(x => x.id != id);
            storage.logs = storage.logs.filter(x => x.tId != id);
            saveData(); loadTrainees();
        }
    }

    // الحضور والغياب
    function setAbsence(status) {
        let t = document.getElementById('traineeSelectBox').value;
        let d = document.getElementById('workDate').value;
        if(!t || !d) return;
        storage.logs = storage.logs.filter(x => !(x.tId == t && x.date == d));
        storage.logs.push({ tId: t, date: d, status: status });
        saveData(); updateAlerts(); alert("تم التسجيل");
    }

    function clearDay() {
        let d = document.getElementById('workDate').value;
        if(confirm(`مسح سجلات تاريخ ${d}؟`)) {
            storage.logs = storage.logs.filter(x => x.date !== d);
            saveData(); updateAlerts();
        }
    }

    function updateAlerts() {
        let box = document.getElementById('alertBox');
        box.innerHTML = '';
        let counts = {};
        storage.logs.filter(x => x.status === 'غائب').forEach(x => counts[x.tId] = (counts[x.tId] || 0) + 1);

        for(let id in counts) {
            if(counts[id] >= 3) {
                let t = storage.students.find(x => x.id == id);
                if(t) {
                    box.innerHTML += `
                        <div class="item-row" style="background:#fff5f5">
                            <span>${t.name} (${counts[id]} غيابات)</span>
                            <div class="admin-controls">
                                <a class="wa-btn" href="https://wa.me/${t.phone}?text=تنبيه غياب" target="_blank">واتساب</a>
                                <button class="word-btn" onclick="makeWord(${id})">وورد</button>
                            </div>
                        </div>`;
                }
            }
        }
    }

    function saveData() { localStorage.setItem('abs_final_fix', JSON.stringify(storage)); }

    async function makeWord(id) {
        let t = storage.students.find(x => x.id == id);
        let abs = storage.logs.filter(x => x.tId == id && x.status === 'غائب').map(x => x.date).join(" / ");
        const { Document, Packer, Paragraph, TextRun, AlignmentType } = window.docx;
        const doc = new Document({
            sections: [{ children: [
                new Paragraph({ text: "إشعار غياب", alignment: AlignmentType.CENTER, heading: "Heading1" }),
                new Paragraph({ children: [new TextRun({ text: "المتربص: ", bold: true }), new TextRun({ text: t.name })], alignment: AlignmentType.RIGHT }),
                new Paragraph({ text: "التواريخ: " + abs, alignment: AlignmentType.RIGHT }),
                new Paragraph({ text: "تاريخ اليوم: " + new Date().toLocaleDateString('ar-DZ'), alignment: AlignmentType.LEFT })
            ] }]
        });
        Packer.toBlob(doc).then(blob => saveAs(blob, `استدعاء_${t.name}.docx`));
    }
</script>
</body>
</html>
