<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الحضور والغياب المؤسسي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2980b9;
            --success: #27ae60;
            --danger: #c0392b;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #2f3640;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            line-height: 1.6;
        }

        .container { max-width: 900px; margin: 0 auto; }
        
        /* البطاقات وتنسيق الواجهة */
        .card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            margin-bottom: 25px; 
        }

        h1, h2, h3 { color: var(--primary); margin-top: 0; font-weight: 700; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 1.8rem; }
        h2 { border-bottom: 2px solid var(--bg); padding-bottom: 10px; font-size: 1.4rem; }

        label { font-weight: 600; display: block; margin-top: 10px; }

        /* مدخلات البيانات */
        input, select { 
            font-family: 'Cairo', sans-serif;
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 2px solid #e1e4e8; 
            border-radius: 10px; 
            box-sizing: border-box; 
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--primary); outline: none; }

        /* الأزرار */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { 
            font-family: 'Cairo', sans-serif;
            padding: 10px 15px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: 0.3s; 
            color: white; 
        }
        
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-add { background: var(--primary); }
        .btn-edit { background: #f39c12; }
        .btn-delete { background: var(--danger); }
        .btn-present { background: var(--success); flex: 1; padding: 15px; font-size: 1.1rem; }
        .btn-absent { background: var(--danger); flex: 1; padding: 15px; font-size: 1.1rem; }

        /* سجل الحضور */
        #attendanceLogs { margin-top: 15px; }
        .attendance-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 20px; 
            border-radius: 10px; 
            margin-bottom: 8px; 
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .status-present { background: #d4edda; color: #155724; border-right: 5px solid var(--success); }
        .status-absent { background: #f8d7da; color: #721c24; border-right: 5px solid var(--danger); }

        .chart-box { max-width: 320px; margin: 20px auto; }
        
        #loginPage { text-align: center; max-width: 400px; margin: 80px auto; }

        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }

        /* التجاوب مع الجوال */
        @media (max-width: 600px) {
            .btn-group { grid-template-columns: 1fr; }
            .attendance-row { font-size: 0.9rem; }
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div id="loginPage" class="card">
    <h1>نظام الحضور والغياب</h1>
    <p>يرجى تسجيل الدخول للمتابعة</p>
    <input type="text" id="user" placeholder="اسم المستخدم (admin)">
    <input type="password" id="pass" placeholder="كلمة المرور (1234)">
    <button class="btn-add" style="width:100%; padding: 15px;" onclick="login()">دخول النظام</button>
</div>

<div id="mainApp" style="display:none;" class="container">
    <h1>لوحة إدارة المركز</h1>

    <div class="card">
        <h2><i class="icon">📁</i> إدارة التخصصات والمتربصين</h2>
        
        <label>التخصص:</label>
        <div style="display:flex; gap:10px;">
            <select id="specList" onchange="updateTraineeList()"></select>
            <input type="text" id="specInput" placeholder="أضف تخصص جديد..." style="margin:0">
        </div>
        <div class="btn-group">
            <button class="btn-add" onclick="addSpec()">إضافة</button>
            <button class="btn-edit" onclick="editSpec()">تعديل</button>
            <button class="btn-delete" onclick="deleteSpec()">حذف</button>
        </div>

        <hr>

        <label>المتربص:</label>
        <div style="display:flex; gap:10px;">
            <select id="traineeList"></select>
            <input type="text" id="traineeInput" placeholder="أضف اسم المتربص..." style="margin:0">
        </div>
        <div class="btn-group">
            <button class="btn-add" onclick="addTrainee()">إضافة</button>
            <button class="btn-edit" onclick="editTrainee()">تعديل</button>
            <button class="btn-delete" onclick="deleteTrainee()">حذف</button>
        </div>
    </div>

    <div class="card">
        <h2><i class="icon">📅</i> تسجيل حضور اليوم</h2>
        <label>تاريخ اليوم:</label>
        <input type="date" id="attDate" onchange="renderAttendance(); updateChart();">
        <div style="display:flex; gap:15px; margin-top:15px;">
            <button class="btn-present" onclick="mark('حاضر')">✔ تسجيل حضور</button>
            <button class="btn-absent" onclick="mark('غائب')">✖ تسجيل غياب</button>
        </div>
    </div>

    <div class="card">
        <h2><i class="icon">📊</i> الإحصائيات والبحث</h2>
        <div style="display:flex; gap:10px; flex-wrap: wrap;">
            <input type="text" id="searchBox" placeholder="ابحث عن متربص بالاسم..." oninput="renderAttendance()" style="flex:2; min-width:200px">
            <select id="filterSpec" onchange="renderAttendance(); updateChart();" style="flex:1; min-width:150px">
                <option value="">كل التخصصات</option>
            </select>
        </div>
        
        <div class="chart-box">
            <canvas id="myChart"></canvas>
        </div>

        <div id="attendanceLogs"></div>
        
        <button class="btn-add" style="width:100%; background:#8e44ad; margin-top:20px; padding: 15px;" onclick="exportExcel()">
            📥 تصدير السجلات إلى Excel
        </button>
    </div>
</div>

<script>
    // تهيئة البيانات واسترجاعها من التخزين المحلي
    let data = JSON.parse(localStorage.getItem('eduData')) || { specs: [], trainees: [], attendance: [] };
    let chartInstance = null;

    function save() { 
        localStorage.setItem('eduData', JSON.stringify(data)); 
    }

    function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === 'admin' && p === '1234') {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            init();
        } else { 
            alert("اسم المستخدم أو كلمة المرور غير صحيحة"); 
        }
    }

    function init() {
        // تعيين تاريخ اليوم تلقائياً
        document.getElementById('attDate').valueAsDate = new Date();
        refreshSpecs();
        renderAttendance();
        updateChart();
    }

    // إدارة التخصصات
    function addSpec() {
        let name = document.getElementById('specInput').value.trim();
        if(!name) return;
        data.specs.push({ id: Date.now(), name: name });
        document.getElementById('specInput').value = '';
        save(); refreshSpecs();
    }

    function refreshSpecs() {
        let html = data.specs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        document.getElementById('specList').innerHTML = html;
        document.getElementById('filterSpec').innerHTML = '<option value="">كل التخصصات</option>' + html;
        updateTraineeList();
    }

    function editSpec() {
        let id = document.getElementById('specList').value;
        let newName = prompt("أدخل الاسم الجديد للتخصص:");
        if(newName && id) {
            let spec = data.specs.find(s => s.id == id);
            spec.name = newName;
            save(); refreshSpecs();
        }
    }

    function deleteSpec() {
        let id = document.getElementById('specList').value;
        if(!id || !confirm("تحذير: سيتم حذف التخصص وجميع المتربصين التابعين له بشكل نهائي!")) return;
        data.specs = data.specs.filter(s => s.id != id);
        data.trainees = data.trainees.filter(t => t.specId != id);
        save(); refreshSpecs();
    }

    // إدارة المتربصين
    function addTrainee() {
        let name = document.getElementById('traineeInput').value.trim();
        let specId = document.getElementById('specList').value;
        if(!name || !specId) return alert("يرجى التأكد من إضافة تخصص وكتابة اسم المتربص");
        data.trainees.push({ id: Date.now(), name: name, specId: specId });
        document.getElementById('traineeInput').value = '';
        save(); updateTraineeList();
    }

    function updateTraineeList() {
        let specId = document.getElementById('specList').value;
        let trainees = data.trainees.filter(t => t.specId == specId);
        document.getElementById('traineeList').innerHTML = trainees.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    }

    function editTrainee() {
        let id = document.getElementById('traineeList').value;
        let newName = prompt("أدخل الاسم الجديد للمتربص:");
        if(newName && id) {
            let t = data.trainees.find(tr => tr.id == id);
            t.name = newName;
            save(); updateTraineeList();
        }
    }

    function deleteTrainee() {
        let id = document.getElementById('traineeList').value;
        if(!id || !confirm("هل أنت متأكد من حذف هذا المتربص؟")) return;
        data.trainees = data.trainees.filter(t => t.id != id);
        save(); updateTraineeList();
    }

    // تسجيل الحضور
    function mark(status) {
        let tId = document.getElementById('traineeList').value;
        let date = document.getElementById('attDate').value;
        if(!tId || !date) return alert("يرجى اختيار المتربص والتاريخ أولاً");

        // تحديث الحالة إذا كانت موجودة مسبقاً لنفس اليوم
        data.attendance = data.attendance.filter(a => !(a.tId == tId && a.date == date));
        
        data.attendance.push({ tId: tId, date: date, status: status });
        save(); renderAttendance(); updateChart();
    }

    // عرض سجلات الحضور
    function renderAttendance() {
        let date = document.getElementById('attDate').value;
        let search = document.getElementById('searchBox').value.toLowerCase();
        let filter = document.getElementById('filterSpec').value;
        
        let logs = data.attendance.filter(a => a.date === date);
        let html = '';

        logs.forEach(log => {
            let trainee = data.trainees.find(t => t.id == log.tId);
            if(!trainee) return;
            
            if((!filter || trainee.specId == filter) && (trainee.name.toLowerCase().includes(search))) {
                let statusClass = log.status === 'حاضر' ? 'status-present' : 'status-absent';
                html += `<div class="attendance-row ${statusClass}">
                            <span><b>${trainee.name}</b></span>
                            <span>${log.status}</span>
                         </div>`;
            }
        });
        document.getElementById('attendanceLogs').innerHTML = html || '<p style="text-align:center; color:#999; margin: 20px 0;">لا توجد سجلات لهذا اليوم</p>';
    }

    // الرسوم البيانية
    function updateChart() {
        let date = document.getElementById('attDate').value;
        let filter = document.getElementById('filterSpec').value;
        let daily = data.attendance.filter(a => a.date === date);
        
        if(filter) {
            daily = daily.filter(a => {
                let t = data.trainees.find(tr => tr.id == a.tId);
                return t && t.specId == filter;
            });
        }

        let present = daily.filter(a => a.status === 'حاضر').length;
        let absent = daily.filter(a => a.status === 'غائب').length;

        const ctx = document.getElementById('myChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        
        if(present === 0 && absent === 0) {
             // لا تعرض رسم بياني فارغ
             return;
        }

        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['حضور', 'غياب'],
                datasets: [{ 
                    data: [present, absent], 
                    backgroundColor: ['#27ae60', '#c0392b'],
                    borderWidth: 0 
                }]
            },
            options: { 
                responsive: true,
                plugins: {
                    legend: { position: 'bottom', labels: { font: { family: 'Cairo' } } }
                }
            }
        });
    }

    // تصدير البيانات إلى Excel
    function exportExcel() {
        if(data.attendance.length === 0) return alert("لا توجد بيانات لتصديرها");

        let report = data.attendance.map(a => {
            let t = data.trainees.find(tr => tr.id == a.tId);
            let s = data.specs.find(sp => sp.id == (t ? t.specId : null));
            return {
                "التاريخ": a.date,
                "اسم المتربص": t ? t.name : "محذوف",
                "التخصص": s ? s.name : "غير محدد",
                "حالة الحضور": a.status
            };
        });

        const ws = XLSX.utils.json_to_sheet(report);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Attendance Report");
        XLSX.writeFile(wb, "Sijil_Al_Houdour.xlsx");
    }
</script>
</body>
</html>
