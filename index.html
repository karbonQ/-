<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الإدارة - النسخة المستقلة تماماً</title>
    <style>
        :root { --p: #2c3e50; --s: #27ae60; --d: #e74c3c; --w: #3498db; }
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; direction: rtl; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd; font-size: 16px; }
        button { color: white; cursor: pointer; border: none; font-weight: bold; }
        .btn-blue { background: var(--p); }
        .btn-green { background: var(--s); }
        .btn-word { background: var(--w); }
        .alert-box { border-right: 5px solid var(--d); background: #fff5f5; padding: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.45.0/build/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">نظام تسيير الاستدعاءات</h2>
    
    <div id="loginSection">
        <input type="password" id="passInput" placeholder="كلمة المرور (1234)">
        <button class="btn-blue" onclick="checkLogin()">دخول</button>
    </div>

    <div id="appSection" style="display:none;">
        <label>إضافة متربص:</label>
        <input type="text" id="tName" placeholder="الاسم الكامل">
        <button class="btn-green" onclick="saveTrainee()">حفظ المتربص</button>
        
        <hr>
        
        <label>تسجيل غياب اليوم:</label>
        <select id="tSelect"></select>
        <button class="btn-blue" onclick="markAbsence()">تسجيل كـ غائب</button>
        
        <hr>
        
        <h3>الاستدعاءات المستحقة (>3 غيابات)</h3>
        <div id="alertList"></div>
    </div>
</div>

<script>
    let storage = JSON.parse(localStorage.getItem('off_sys_v9')) || { trainees: [], att: [] };

    function checkLogin() {
        if(document.getElementById('passInput').value === '1234') {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
            renderData();
        } else alert("خطأ");
    }

    function saveTrainee() {
        let n = document.getElementById('tName').value;
        if(n) {
            storage.trainees.push({id: Date.now(), name: n});
            localStorage.setItem('off_sys_v9', JSON.stringify(storage));
            renderData();
            document.getElementById('tName').value = '';
        }
    }

    function renderData() {
        let select = document.getElementById('tSelect');
        select.innerHTML = storage.trainees.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        
        let list = document.getElementById('alertList');
        list.innerHTML = '';
        
        let counts = {};
        storage.att.forEach(a => counts[a.id] = (counts[a.id] || 0) + 1);
        
        for(let id in counts) {
            if(counts[id] >= 3) {
                let trainee = storage.trainees.find(t => t.id == id);
                if(trainee) {
                    list.innerHTML += `
                        <div class="alert-box">
                            <span>${trainee.name} (${counts[id]} غيابات)</span>
                            <button class="btn-word" style="width:auto;" onclick="runWord('${id}')">تحميل الوورد</button>
                        </div>`;
                }
            }
        }
    }

    function markAbsence() {
        let id = document.getElementById('tSelect').value;
        if(id) {
            storage.att.push({id: id, date: new Date().toLocaleDateString()});
            localStorage.setItem('off_sys_v9', JSON.stringify(storage));
            renderData();
            alert("تم تسجيل الغياب");
        }
    }

    async function runWord(id) {
        // التحقق من المكتبة
        if (typeof window.PizZip === "undefined") {
            alert("لا تزال هناك مشكلة في تحميل المكتبات من الإنترنت. يرجى فتح الملف مرة واحدة في مكان به إنترنت ليتم حفظ المكتبات في المتصفح.");
            return;
        }

        let trainee = storage.trainees.find(t => t.id == id);
        let dates = storage.att.filter(a => a.id == id).map(a => a.date).join(" / ");

        alert("الآن اختر ملف القالب (الذي وضعت فيه {{name}} و {{dates}})");

        let fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = '.docx';
        fileInput.onchange = e => {
            let reader = new FileReader();
            reader.onload = f => {
                try {
                    let zip = new PizZip(f.target.result);
                    let doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
                    
                    doc.setData({
                        name: trainee.name,
                        dates: dates,
                        today: new Date().toLocaleDateString()
                    });

                    doc.render();
                    let out = doc.getZip().generate({type:"blob"});
                    saveAs(out, `استدعاء_${trainee.name}.docx`);
                } catch (err) {
                    alert("تأكد من أن القالب يحتوي على الأقواس {{ }} بشكل صحيح");
                }
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        };
        fileInput.click();
    }
</script>
</body>
</html>
